<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dots — stylejoy</title>
<link rel="stylesheet" href="/styles.css">
<style>
  /* ---- dots.html 专有样式 ---- */
  #canvas-wrap{max-width:none !important;max-height:none !important}
  #out-canvas{width:100%!important;height:100%!important;
    max-width:none!important;max-height:none!important;display:block}
  .preview{padding:16px}

  /* drop zone */
  .drop{
    flex:1;border:1.5px dashed var(--line);border-radius:var(--r);
    padding:14px 10px;text-align:center;cursor:pointer;
    color:var(--text-dim);font-size:12.5px;transition:.15s;
  }
  .drop:hover,.drop.over{border-color:var(--accent);color:var(--text)}
  .drop .ico{display:block;font-size:22px;margin-bottom:5px;line-height:1}
  .drop b{font-weight:600}

  /* empty hint */
  .empty-hint{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    text-align:center;color:var(--text-dim);font-size:14px;line-height:1.8;
    pointer-events:none;
  }

  /* segment button rows */
  .seg-row{display:flex;gap:5px;margin-top:4px}
  .seg-btn{
    flex:1;height:34px;border-radius:var(--r);border:1px solid var(--line);
    background:var(--panel-2);color:var(--text-dim);font-size:12px;
    font-family:var(--font);cursor:pointer;transition:.12s;white-space:nowrap;
  }
  .seg-btn.active,.seg-btn:hover{border-color:var(--accent);color:var(--accent)}

  /* select */
  .sel{
    width:100%;background:var(--panel-2);border:1px solid var(--line);
    border-radius:var(--r);color:var(--text);font-size:12.5px;
    font-family:var(--font);padding:7px 10px;outline:none;cursor:pointer;
  }
  .sel:focus{border-color:var(--accent)}

  /* color button */
  .colorbtn-row{display:flex;align-items:center;gap:8px;margin-top:6px;cursor:pointer}
  .chip{width:26px;height:26px;border-radius:5px;border:1px solid var(--line);flex-shrink:0}
  .colorbtn-label{font-size:12px;color:var(--text-dim);flex:1}

  /* checkbox row */
  .check-row{
    display:flex;align-items:center;justify-content:space-between;
    padding:5px 0;cursor:pointer;font-size:12.5px;color:var(--text-dim);
  }
  .check-row input[type=checkbox]{width:15px;height:15px;accent-color:var(--accent);cursor:pointer}

  /* disabled field */
  .field.disabled{opacity:0.35;pointer-events:none}

  /* export buttons spacing */
  .group:last-child .btn{margin-bottom:8px;display:block}
  .group:last-child .btn:last-child{margin-bottom:0}

  /* SVG disabled tooltip */
  #btn-svg[disabled]{opacity:0.4;cursor:not-allowed}
</style>
</head>
<body>
<div class="app">

  <!-- ===== LEFT: stage ===== -->
  <main class="stage" id="stage">
    <div class="leftbar">
      <div class="brand">
        <h1>
          <img src="/stylejoy-logo.svg" class="brand-logo" alt="stylejoy">
          <span class="title-text" data-i18n="dots_title">StyleJoy.art</span>
          <button class="pill" id="lang-toggle">EN</button>
          <button class="pill" id="account-btn">Sign in</button>
        </h1>
        <p data-i18n="dots_subtitle">Photo → dot grid art</p>
      </div>
      <div class="getrow">
        <div class="drop" id="drop">
          <span class="ico">⇪</span>
          <b data-i18n="dots_drop">Upload / drop photo</b>
          <input type="file" id="file-input" accept="image/*" hidden>
        </div>
      </div>
    </div>

    <div class="preview" id="preview">
      <div class="canvas-wrap" id="canvas-wrap" style="display:none;position:relative">
        <canvas id="out-canvas"></canvas>
      </div>
      <div class="empty-hint" id="hint">
        <b data-i18n="dots_hint_b">Upload a photo</b><br>
        <span data-i18n="dots_hint_s">JPG / PNG / WEBP</span>
      </div>
    </div>
  </main>

  <!-- ===== RIGHT: panel ===== -->
  <aside class="panel">
    <div class="scroll">

      <!-- 1. Algorithm -->
      <div class="group">
        <h2><span class="bar"></span><span data-i18n="dots_g_algo">Algorithm</span></h2>
        <div class="field">
          <label class="mini-label" data-i18n="dots_l_mode">Mode</label>
          <div class="seg-row">
            <button class="seg-btn active" data-mode="classic" data-i18n="dots_mode_classic">Classic Grid</button>
            <button class="seg-btn" data-mode="liquid" data-i18n="dots_mode_liquid">Liquid Amoeba</button>
          </div>
        </div>
        <div class="field" id="shape-field">
          <label class="mini-label" data-i18n="dots_l_shape">Shape (classic)</label>
          <div class="seg-row">
            <button class="seg-btn active" data-shape="circle" data-i18n="dots_shape_circle">Circle</button>
            <button class="seg-btn" data-shape="square" data-i18n="dots_shape_square">Square</button>
          </div>
        </div>
      </div>

      <!-- 2. Display -->
      <div class="group">
        <h2><span class="bar"></span><span data-i18n="dots_g_display">Display</span></h2>
        <label class="check-row">
          <span data-i18n="dots_l_showsrc">Show source image</span>
          <input type="checkbox" id="ck-showsrc">
        </label>
        <div class="field" style="margin-top:8px">
          <label class="mini-label" data-i18n="dots_l_bgcolor">Background color</label>
          <div class="colorbtn-row" id="colorbtn-bg">
            <span class="chip" id="chip-bg" style="background:#f5f0e8"></span>
            <span class="colorbtn-label" id="label-bg">#f5f0e8</span>
            <input type="color" id="color-bg" value="#f5f0e8" style="position:absolute;opacity:0;width:0;height:0">
          </div>
        </div>
        <div class="field">
          <div class="row">
            <label data-i18n="dots_l_texture">Texture</label>
          </div>
          <select class="sel" id="sel-texture">
            <option value="none" data-i18n="dots_tex_none">None</option>
            <option value="noise" data-i18n="dots_tex_noise">Noise</option>
            <option value="canvas" data-i18n="dots_tex_canvas">Canvas</option>
            <option value="grid" data-i18n="dots_tex_grid">Grid</option>
          </select>
        </div>
        <div class="field">
          <div class="row">
            <label data-i18n="dots_l_texstr">Texture strength</label>
            <span class="val" id="v-texstr">0</span>
          </div>
          <input type="range" id="sl-texstr" min="0" max="100" value="0">
        </div>
      </div>

      <!-- 3. Color & Blend -->
      <div class="group">
        <h2><span class="bar"></span><span data-i18n="dots_g_color">Color &amp; Blend</span></h2>
        <div class="field">
          <label class="mini-label" data-i18n="dots_l_blendcolor">Blend color</label>
          <div class="colorbtn-row" id="colorbtn-ink">
            <span class="chip" id="chip-ink" style="background:#16140f"></span>
            <span class="colorbtn-label" id="label-ink">#16140f</span>
            <input type="color" id="color-ink" value="#16140f" style="position:absolute;opacity:0;width:0;height:0">
          </div>
        </div>
        <label class="check-row">
          <span data-i18n="dots_l_useorig">Use original color</span>
          <input type="checkbox" id="ck-useorig">
        </label>
        <label class="check-row">
          <span data-i18n="dots_l_neighborblend">Neighbor color blend</span>
          <input type="checkbox" id="ck-neighbor">
        </label>
        <div class="field">
          <div class="row">
            <label data-i18n="dots_l_blendmode">Blend mode</label>
          </div>
          <select class="sel" id="sel-blendmode">
            <option value="source-over" data-i18n="dots_bm_normal">Normal</option>
            <option value="multiply" data-i18n="dots_bm_multiply">Multiply</option>
            <option value="screen" data-i18n="dots_bm_screen">Screen</option>
            <option value="overlay" data-i18n="dots_bm_overlay">Overlay</option>
            <option value="color-dodge" data-i18n="dots_bm_dodge">Color Dodge</option>
          </select>
        </div>
        <div class="field">
          <div class="row">
            <label data-i18n="dots_l_opacity">Blend opacity</label>
            <span class="val" id="v-opacity">255</span>
          </div>
          <input type="range" id="sl-opacity" min="0" max="255" value="255">
        </div>
        <label class="check-row">
          <span data-i18n="dots_l_invert">Invert sample</span>
          <input type="checkbox" id="ck-invert">
        </label>
      </div>

      <!-- 4. Grid -->
      <div class="group">
        <h2><span class="bar"></span><span data-i18n="dots_g_grid">Grid</span></h2>
        <div class="field">
          <div class="row">
            <label data-i18n="dots_l_cellsize">Cell size</label>
            <span class="val" id="v-cellsize">14 px</span>
          </div>
          <input type="range" id="sl-cellsize" min="4" max="80" value="14" step="1">
        </div>
        <div class="field">
          <div class="row">
            <label data-i18n="dots_l_density">Dot density</label>
            <span class="val" id="v-density">90%</span>
          </div>
          <input type="range" id="sl-density" min="10" max="100" value="90">
        </div>
        <div class="field">
          <div class="row">
            <label data-i18n="dots_l_rowoffset">Row offset</label>
            <span class="val" id="v-rowoffset">0%</span>
          </div>
          <input type="range" id="sl-rowoffset" min="-50" max="50" value="0">
        </div>
        <div class="field">
          <div class="row">
            <label data-i18n="dots_l_whitethresh">White threshold</label>
            <span class="val" id="v-whitethresh">50</span>
          </div>
          <input type="range" id="sl-whitethresh" min="0" max="100" value="50">
        </div>
        <div class="field">
          <div class="row">
            <label data-i18n="dots_l_contrast">Gray contrast</label>
            <span class="val" id="v-contrast">130</span>
          </div>
          <input type="range" id="sl-contrast" min="50" max="300" value="130">
        </div>
        <label class="check-row">
          <span data-i18n="dots_l_graymap">Gray mapping</span>
          <input type="checkbox" id="ck-graymap">
        </label>
        <div class="field" id="mapthresh-field" style="margin-top:6px">
          <div class="row">
            <label data-i18n="dots_l_mapthresh">Mapping threshold</label>
            <span class="val" id="v-mapthresh">50</span>
          </div>
          <input type="range" id="sl-mapthresh" min="0" max="100" value="50">
        </div>
      </div>

      <!-- 5. Amoeba (liquid only) -->
      <div class="group" id="amoeba-group">
        <h2><span class="bar"></span><span data-i18n="dots_g_amoeba">Amoeba</span></h2>
        <div class="field">
          <div class="row">
            <label data-i18n="dots_l_spread">Spread density</label>
            <span class="val" id="v-spread">70%</span>
          </div>
          <input type="range" id="sl-spread" min="10" max="100" value="70">
        </div>
        <div class="field">
          <div class="row">
            <label data-i18n="dots_l_dotratio">Dot size ratio</label>
            <span class="val" id="v-dotratio">55%</span>
          </div>
          <input type="range" id="sl-dotratio" min="10" max="100" value="55">
        </div>
        <div class="field">
          <div class="row">
            <label data-i18n="dots_l_quality">Render quality</label>
          </div>
          <select class="sel" id="sel-quality">
            <option value="0.5" data-i18n="dots_q_low">Low</option>
            <option value="1" selected data-i18n="dots_q_med">Medium</option>
            <option value="1.5" data-i18n="dots_q_high">High</option>
            <option value="2" data-i18n="dots_q_ultra">Ultra</option>
          </select>
        </div>
        <div class="field">
          <div class="row">
            <label data-i18n="dots_l_merge">Merge strength</label>
            <span class="val" id="v-merge">70%</span>
          </div>
          <input type="range" id="sl-merge" min="0" max="100" value="70">
        </div>
      </div>

      <!-- 6. Export -->
      <div class="group">
        <h2><span class="bar"></span><span data-i18n="dots_g_export">Export</span></h2>
        <button class="btn btn-ghost" id="btn-png-free" data-i18n="dots_exp_free">Export PNG (free)</button>
        <button class="btn btn-primary" id="btn-png-hd" data-i18n="dots_exp_hd">Export HD PNG</button>
        <button class="btn btn-ghost" id="btn-png-alpha" data-i18n="dots_exp_alpha">Export Transparent PNG</button>
        <button class="btn btn-ghost" id="btn-svg" data-i18n="dots_exp_svg">Export SVG (Classic only)</button>
      </div>

    </div>
  </aside>
</div>

<footer id="site-footer">
  <a href="/privacy.html" target="_blank" rel="noopener">Privacy</a>
  <span class="sep">·</span>
  <a href="/terms.html" target="_blank" rel="noopener">Terms</a>
  <span class="sep">·</span>
  <span>© 2026 stylejoy</span>
</footer>

<script src="/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/auth.js"></script>
<script>
(function(){
'use strict';

// ===== i18n =====
const DOTS_I18N = {
  zh:{
    dots_title:'StyleJoy.art', dots_subtitle:'照片 → 点阵艺术',
    dots_drop:'上传 / 拖入照片',
    dots_hint_b:'上传一张照片', dots_hint_s:'支持 JPG / PNG / WEBP',
    dots_g_algo:'算法', dots_l_mode:'模式',
    dots_mode_classic:'经典网格', dots_mode_liquid:'液态颗粒',
    dots_l_shape:'形状（经典）', dots_shape_circle:'圆点', dots_shape_square:'方块',
    dots_g_display:'显示', dots_l_showsrc:'叠显原图',
    dots_l_bgcolor:'背景颜色', dots_l_texture:'背景肌理',
    dots_tex_none:'无', dots_tex_noise:'噪点', dots_tex_canvas:'布纹', dots_tex_grid:'格线',
    dots_l_texstr:'肌理强度',
    dots_g_color:'颜色与混合', dots_l_blendcolor:'融合颜色',
    dots_l_useorig:'使用原色', dots_l_neighborblend:'相邻色混合',
    dots_l_blendmode:'混合模式',
    dots_bm_normal:'正常', dots_bm_multiply:'正片叠底', dots_bm_screen:'滤色',
    dots_bm_overlay:'叠加', dots_bm_dodge:'颜色减淡',
    dots_l_opacity:'融合透明度', dots_l_invert:'反向取样',
    dots_g_grid:'网格参数', dots_l_cellsize:'单元尺寸',
    dots_l_density:'点阵密度', dots_l_rowoffset:'行距补偿',
    dots_l_whitethresh:'留白阈值', dots_l_contrast:'灰度对比',
    dots_l_graymap:'灰度映射', dots_l_mapthresh:'映射阈值',
    dots_g_amoeba:'液态参数', dots_l_spread:'排布密度',
    dots_l_dotratio:'点径占比', dots_l_quality:'渲染质量',
    dots_q_low:'低', dots_q_med:'中', dots_q_high:'高', dots_q_ultra:'最高',
    dots_l_merge:'融合强度',
    dots_g_export:'导出',
    dots_exp_free:'导出 PNG（免费）', dots_exp_hd:'导出高清 PNG',
    dots_exp_alpha:'导出透明 PNG', dots_exp_svg:'导出 SVG（仅经典）',
  },
  en:{
    dots_title:'StyleJoy.art', dots_subtitle:'Photo → dot grid art',
    dots_drop:'Upload / drop photo',
    dots_hint_b:'Upload a photo', dots_hint_s:'JPG / PNG / WEBP',
    dots_g_algo:'Algorithm', dots_l_mode:'Mode',
    dots_mode_classic:'Classic Grid', dots_mode_liquid:'Liquid Amoeba',
    dots_l_shape:'Shape (classic)', dots_shape_circle:'Circle', dots_shape_square:'Square',
    dots_g_display:'Display', dots_l_showsrc:'Show source image',
    dots_l_bgcolor:'Background color', dots_l_texture:'Texture',
    dots_tex_none:'None', dots_tex_noise:'Noise', dots_tex_canvas:'Canvas', dots_tex_grid:'Grid',
    dots_l_texstr:'Texture strength',
    dots_g_color:'Color & Blend', dots_l_blendcolor:'Blend color',
    dots_l_useorig:'Use original color', dots_l_neighborblend:'Neighbor color blend',
    dots_l_blendmode:'Blend mode',
    dots_bm_normal:'Normal', dots_bm_multiply:'Multiply', dots_bm_screen:'Screen',
    dots_bm_overlay:'Overlay', dots_bm_dodge:'Color Dodge',
    dots_l_opacity:'Blend opacity', dots_l_invert:'Invert sample',
    dots_g_grid:'Grid', dots_l_cellsize:'Cell size',
    dots_l_density:'Dot density', dots_l_rowoffset:'Row offset',
    dots_l_whitethresh:'White threshold', dots_l_contrast:'Gray contrast',
    dots_l_graymap:'Gray mapping', dots_l_mapthresh:'Mapping threshold',
    dots_g_amoeba:'Amoeba', dots_l_spread:'Spread density',
    dots_l_dotratio:'Dot size ratio', dots_l_quality:'Render quality',
    dots_q_low:'Low', dots_q_med:'Medium', dots_q_high:'High', dots_q_ultra:'Ultra',
    dots_l_merge:'Merge strength',
    dots_g_export:'Export',
    dots_exp_free:'Export PNG (free)', dots_exp_hd:'Export HD PNG',
    dots_exp_alpha:'Export Transparent PNG', dots_exp_svg:'Export SVG (Classic only)',
  },
};

let lang = localStorage.getItem('ri_lang') || 'en';
function applyLang(){
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const k = el.dataset.i18n;
    if(DOTS_I18N[lang]?.[k]) el.textContent = DOTS_I18N[lang][k];
  });
  document.getElementById('lang-toggle').textContent = lang==='en'?'中':'EN';
}
document.getElementById('lang-toggle').addEventListener('click',()=>{
  lang = lang==='en'?'zh':'en';
  localStorage.setItem('ri_lang', lang);
  applyLang();
});
applyLang();

// ===== State =====
let mode = 'classic';   // 'classic' | 'liquid'
let shape = 'circle';   // 'circle' | 'square'
let srcImage = null;    // HTMLImageElement
let srcW = 0, srcH = 0;
let outW = 0, outH = 0;
let rafPending = false;
let cells = null;       // cached sample grid

// ===== DOM refs =====
const preview    = document.getElementById('preview');
const wrap       = document.getElementById('canvas-wrap');
const outCanvas  = document.getElementById('out-canvas');
const hint       = document.getElementById('hint');
const ctx        = outCanvas.getContext('2d');

// ===== Mode / shape buttons =====
document.querySelectorAll('[data-mode]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    mode = btn.dataset.mode;
    document.querySelectorAll('[data-mode]').forEach(b=>b.classList.toggle('active', b===btn));
    document.getElementById('amoeba-group').style.opacity  = mode==='liquid' ? '1' : '0.4';
    document.getElementById('amoeba-group').style.pointerEvents = mode==='liquid' ? '' : 'none';
    document.getElementById('shape-field').style.opacity   = mode==='classic' ? '1' : '0.4';
    document.getElementById('shape-field').style.pointerEvents  = mode==='classic' ? '' : 'none';
    document.getElementById('btn-svg').disabled = mode==='liquid';
    invalidateCells();
    scheduleRender();
  });
});
document.querySelectorAll('[data-shape]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    shape = btn.dataset.shape;
    document.querySelectorAll('[data-shape]').forEach(b=>b.classList.toggle('active', b===btn));
    scheduleRender();
  });
});
// Init amoeba group visible only in liquid mode
document.getElementById('amoeba-group').style.opacity = '0.4';
document.getElementById('amoeba-group').style.pointerEvents = 'none';

// ===== Color pickers =====
function wireColorPicker(btnId, chipId, labelId, inputId, onChange){
  const btn   = document.getElementById(btnId);
  const chip  = document.getElementById(chipId);
  const label = document.getElementById(labelId);
  const input = document.getElementById(inputId);
  btn.addEventListener('click',()=>input.click());
  input.addEventListener('input',()=>{
    chip.style.background = input.value;
    label.textContent = input.value;
    onChange(input.value);
  });
}
wireColorPicker('colorbtn-bg', 'chip-bg', 'label-bg', 'color-bg', ()=>scheduleRender());
wireColorPicker('colorbtn-ink','chip-ink','label-ink','color-ink',()=>scheduleRender());

// ===== Sliders =====
function wireSlider(id, valId, fmt, extra){
  const sl = document.getElementById(id);
  const vl = document.getElementById(valId);
  sl.addEventListener('input',()=>{
    vl.textContent = fmt(parseFloat(sl.value));
    if(extra) extra();
    else scheduleRender();
  });
}
wireSlider('sl-texstr',    'v-texstr',    v=>`${v|0}`, scheduleRender);
wireSlider('sl-opacity',   'v-opacity',   v=>`${v|0}`, scheduleRender);
wireSlider('sl-cellsize',  'v-cellsize',  v=>`${v|0} px`, ()=>{ invalidateCells(); scheduleRender(); });
wireSlider('sl-density',   'v-density',   v=>`${v|0}%`, scheduleRender);
wireSlider('sl-rowoffset', 'v-rowoffset', v=>`${v|0}%`, scheduleRender);
wireSlider('sl-whitethresh','v-whitethresh',v=>`${v|0}`, ()=>{ invalidateCells(); scheduleRender(); });
wireSlider('sl-contrast',  'v-contrast',  v=>`${v|0}`, ()=>{ invalidateCells(); scheduleRender(); });
wireSlider('sl-mapthresh', 'v-mapthresh', v=>`${v|0}`, ()=>{ invalidateCells(); scheduleRender(); });
wireSlider('sl-spread',    'v-spread',    v=>`${v|0}%`, scheduleRender);
wireSlider('sl-dotratio',  'v-dotratio',  v=>`${v|0}%`, scheduleRender);
wireSlider('sl-merge',     'v-merge',     v=>`${v|0}%`, scheduleRender);

// Gray map toggle
document.getElementById('ck-graymap').addEventListener('change', e=>{
  document.getElementById('mapthresh-field').style.opacity = e.target.checked ? '1' : '0.4';
  invalidateCells(); scheduleRender();
});
document.getElementById('mapthresh-field').style.opacity = '0.4';

// Other checkboxes
['ck-showsrc','ck-useorig','ck-neighbor','ck-invert'].forEach(id=>{
  document.getElementById(id).addEventListener('change',()=>{
    if(id==='ck-invert') invalidateCells();
    scheduleRender();
  });
});
document.getElementById('sel-texture').addEventListener('change', scheduleRender);
document.getElementById('sel-blendmode').addEventListener('change', scheduleRender);
document.getElementById('sel-quality').addEventListener('change', scheduleRender);

// ===== Image upload =====
const drop = document.getElementById('drop');
drop.addEventListener('click',()=>document.getElementById('file-input').click());
drop.addEventListener('dragover',e=>{ e.preventDefault(); drop.classList.add('over'); });
drop.addEventListener('dragleave',()=>drop.classList.remove('over'));
drop.addEventListener('drop',e=>{ e.preventDefault(); drop.classList.remove('over');
  const f=e.dataTransfer.files[0]; if(f&&f.type.startsWith('image/')) loadFile(f); });
document.getElementById('file-input').addEventListener('change',e=>{
  if(e.target.files[0]) loadFile(e.target.files[0]);
  e.target.value='';
});

function loadFile(file){
  const img = new Image();
  img.onload = ()=>{
    srcImage = img;
    srcW = img.naturalWidth;
    srcH = img.naturalHeight;
    outW = srcW;
    outH = srcH;
    outCanvas.width  = outW;
    outCanvas.height = outH;
    invalidateCells();
    hint.style.display = 'none';
    wrap.style.display = '';
    fitCanvas();
    scheduleRender();
    URL.revokeObjectURL(img.src);
  };
  img.src = URL.createObjectURL(file);
}

// ===== fitCanvas =====
function fitCanvas(){
  const pad=16;
  const maxW = preview.clientWidth  - pad*2;
  const maxH = preview.clientHeight - pad*2;
  if(maxW<=0||maxH<=0) return;
  const scale = Math.min(maxW/outW, maxH/outH);
  wrap.style.width  = Math.round(outW*scale)+'px';
  wrap.style.height = Math.round(outH*scale)+'px';
}
window.addEventListener('resize', fitCanvas);

// ===== Sampling =====
function invalidateCells(){ cells = null; }

function getParams(){
  return {
    cellSize:    parseInt(document.getElementById('sl-cellsize').value),
    density:     parseInt(document.getElementById('sl-density').value)/100,
    rowOffset:   parseInt(document.getElementById('sl-rowoffset').value)/100,
    whiteThresh: parseInt(document.getElementById('sl-whitethresh').value)/100,
    contrast:    parseInt(document.getElementById('sl-contrast').value)/100,
    grayMap:     document.getElementById('ck-graymap').checked,
    mapThresh:   parseInt(document.getElementById('sl-mapthresh').value)/100,
    invert:      document.getElementById('ck-invert').checked,
    useOrig:     document.getElementById('ck-useorig').checked,
    blendColor:  document.getElementById('color-ink').value,
    bgColor:     document.getElementById('color-bg').value,
    opacity:     parseInt(document.getElementById('sl-opacity').value),
    blendMode:   document.getElementById('sel-blendmode').value,
    neighborBlend: document.getElementById('ck-neighbor').checked,
    showSrc:     document.getElementById('ck-showsrc').checked,
    texture:     document.getElementById('sel-texture').value,
    texStr:      parseInt(document.getElementById('sl-texstr').value)/100,
    spread:      parseInt(document.getElementById('sl-spread').value)/100,
    dotRatio:    parseInt(document.getElementById('sl-dotratio').value)/100,
    quality:     parseFloat(document.getElementById('sel-quality').value),
    merge:       parseInt(document.getElementById('sl-merge').value)/100,
  };
}

function buildCells(p){
  // Sample at capped resolution for large images
  const MAX_SIDE = 1200;
  let sW = srcW, sH = srcH;
  if(Math.max(sW, sH) > MAX_SIDE){
    const r = MAX_SIDE / Math.max(sW, sH);
    sW = Math.round(sW * r);
    sH = Math.round(sH * r);
  }
  const off = document.createElement('canvas');
  off.width = sW; off.height = sH;
  const oc = off.getContext('2d');
  oc.drawImage(srcImage, 0, 0, sW, sH);
  const imgData = oc.getImageData(0, 0, sW, sH).data;

  // Map cell size to sample resolution
  const scaleX = sW / srcW, scaleY = sH / srcH;
  const cs = p.cellSize;
  const cols = Math.ceil(srcW / cs);
  const rows = Math.ceil(srcH / cs);
  const result = [];

  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      let rS=0,gS=0,bS=0,n=0;
      const x0=Math.round(c*cs*scaleX), y0=Math.round(r*cs*scaleY);
      const x1=Math.round((c+1)*cs*scaleX), y1=Math.round((r+1)*cs*scaleY);
      for(let py=y0;py<y1&&py<sH;py++){
        for(let px=x0;px<x1&&px<sW;px++){
          const idx=(py*sW+px)*4;
          rS+=imgData[idx]; gS+=imgData[idx+1]; bS+=imgData[idx+2]; n++;
        }
      }
      if(!n) continue;
      const avgR=rS/n, avgG=gS/n, avgB=bS/n;
      let luma = 0.299*avgR/255 + 0.587*avgG/255 + 0.114*avgB/255;
      // 1. Contrast
      luma = Math.min(1, Math.max(0, (luma - 0.5) * p.contrast + 0.5));
      // 2. Gray mapping (binary threshold)
      if(p.grayMap) luma = luma < p.mapThresh ? 0.0 : 1.0;
      // 3. Invert
      if(p.invert) luma = 1 - luma;
      // 4. Skip bright areas (white threshold: skip if luma > thresh)
      const skip = luma > p.whiteThresh;
      // 5. Draw size: darker pixel = bigger dot (1 - luma)
      const drawSize = 1 - luma;
      result.push({c, r, luma, skip, drawSize, avgR, avgG, avgB});
    }
  }
  return {cells:result, cols, rows, cs};
}

// ===== Color helpers =====
function hexToRgb(hex){
  const n = parseInt(hex.replace('#',''),16);
  return [(n>>16)&255,(n>>8)&255,n&255];
}
function lerp(a,b,t){ return a+(b-a)*t; }
function lerpColor(c1,c2,t){
  return [lerp(c1[0],c2[0],t), lerp(c1[1],c2[1],t), lerp(c1[2],c2[2],t)];
}

// ===== Classic render =====
function renderClassic(targetCtx, scale, p, transparent){
  const W = Math.round(outW*scale), H = Math.round(outH*scale);
  targetCtx.canvas.width  = W;
  targetCtx.canvas.height = H;

  // Background
  if(transparent){
    targetCtx.clearRect(0,0,W,H);
  } else {
    targetCtx.fillStyle = p.bgColor;
    targetCtx.fillRect(0,0,W,H);
  }

  // Optionally show source
  if(p.showSrc && !transparent){
    targetCtx.save();
    targetCtx.globalAlpha = 0.25;
    targetCtx.drawImage(srcImage, 0, 0, W, H);
    targetCtx.restore();
  }

  // Texture underlay
  applyTexture(targetCtx, W, H, p);

  if(!cells) cells = buildCells(p);
  const {cells:cl, cols, rows, cs} = cells;
  const blendRgb = hexToRgb(p.blendColor);
  const alpha = p.opacity/255;

  // Build neighbor lookup for neighbor blend
  const cellMap = {};
  cl.forEach(cell=>{ cellMap[`${cell.r},${cell.c}`] = cell; });

  targetCtx.save();
  targetCtx.globalCompositeOperation = p.blendMode;

  cl.forEach(cell=>{
    if(cell.skip) return;
    const {c, r, luma} = cell;
    // Row offset shift
    const offsetX = (r%2===0 ? 0 : p.rowOffset) * cs;
    const cx = Math.round((c*cs + cs/2 + offsetX)*scale);
    const cy = Math.round((r*cs + cs/2)*scale);
    const radius = Math.max(0.5, (cs/2) * cell.drawSize * p.density * scale);

    // Color
    let color;
    if(p.useOrig){
      color = [cell.avgR, cell.avgG, cell.avgB];
    } else {
      color = [...blendRgb];
    }
    if(p.neighborBlend){
      const neighbors = [
        cellMap[`${r-1},${c}`], cellMap[`${r+1},${c}`],
        cellMap[`${r},${c-1}`], cellMap[`${r},${c+1}`],
      ].filter(Boolean);
      if(neighbors.length){
        let nr=0,ng=0,nb=0;
        neighbors.forEach(n=>{
          nr+=p.useOrig?n.avgR:blendRgb[0];
          ng+=p.useOrig?n.avgG:blendRgb[1];
          nb+=p.useOrig?n.avgB:blendRgb[2];
        });
        const nc=[nr/neighbors.length,ng/neighbors.length,nb/neighbors.length];
        color = lerpColor(color, nc, 0.4);
      }
    }

    targetCtx.globalAlpha = alpha;
    targetCtx.fillStyle = `rgb(${color[0]|0},${color[1]|0},${color[2]|0})`;

    if(shape==='circle'){
      targetCtx.beginPath();
      targetCtx.arc(cx, cy, radius, 0, Math.PI*2);
      targetCtx.fill();
    } else {
      const s = radius*2;
      targetCtx.fillRect(cx-radius, cy-radius, s, s);
    }
  });

  targetCtx.restore();
}

// ===== Liquid Amoeba render =====
function renderLiquid(targetCtx, scale, p, transparent){
  const W = Math.round(outW*scale), H = Math.round(outH*scale);
  const qScale = p.quality;
  const qW = Math.round(W*qScale), qH = Math.round(H*qScale);

  targetCtx.canvas.width  = W;
  targetCtx.canvas.height = H;

  if(!cells) cells = buildCells(p);
  const {cells:cl, cs} = cells;
  const blendRgb = hexToRgb(p.blendColor);
  const qs = scale * qScale;

  // 1. off canvas: black background + circles
  const off = document.createElement('canvas');
  off.width = qW; off.height = qH;
  const oc = off.getContext('2d');
  oc.fillStyle = '#000000';
  oc.fillRect(0,0,qW,qH);

  cl.forEach(cell=>{
    if(cell.skip) return;
    const {c, r, drawSize} = cell;
    const offsetX = (r%2===0 ? 0 : p.rowOffset) * cs;
    const baseCx = (c*cs + cs/2 + offsetX)*qs;
    const baseCy = (r*cs + cs/2)*qs;
    const baseR  = (cs/2) * drawSize * p.dotRatio * qs;

    if(p.useOrig){
      oc.fillStyle = `rgb(${cell.avgR|0},${cell.avgG|0},${cell.avgB|0})`;
    } else {
      oc.fillStyle = '#ffffff';
    }

    const nPts = Math.max(1, Math.round(p.spread * 4));
    for(let i=0;i<nPts;i++){
      const angle = (i/nPts)*Math.PI*2 + (c*7+r*13)*0.3;
      const dist  = (cs/2)*p.spread*0.5*qs;
      const px = baseCx + Math.cos(angle)*dist*(i>0?1:0);
      const py = baseCy + Math.sin(angle)*dist*(i>0?1:0);
      const pr = baseR * (0.8 + Math.random()*0.4);
      if(pr < 0.5) continue;
      oc.beginPath();
      oc.arc(px, py, pr, 0, Math.PI*2);
      oc.fill();
    }
  });

  // 2. Gooey filter: draw off→blurred canvas WITH filter applied at draw time
  const blurR = Math.max(1, cs * p.merge * 0.45 * qScale * scale);
  const contrastY = (8 + p.merge * 22).toFixed(1);
  const blurred = document.createElement('canvas');
  blurred.width = qW; blurred.height = qH;
  const bc = blurred.getContext('2d');
  bc.filter = `blur(${blurR}px) contrast(${contrastY})`;
  bc.drawImage(off, 0, 0);
  bc.filter = 'none';

  // 3. Colorize pass: read blurred pixels, threshold alpha, apply blend color
  const alpha = p.opacity/255;
  if(!p.useOrig){
    // single color mode: rebuild image with blend color
    const maskData = bc.getImageData(0,0,qW,qH);
    const colored  = bc.createImageData(qW,qH);
    const [R,G,B] = blendRgb;
    for(let i=0;i<maskData.data.length;i+=4){
      const lum = maskData.data[i]/255;
      colored.data[i]   = R;
      colored.data[i+1] = G;
      colored.data[i+2] = B;
      colored.data[i+3] = lum > 0.5 ? Math.round(255*alpha) : 0;
    }
    bc.putImageData(colored, 0, 0);
  } else {
    // useOrig: threshold alpha only, keep RGB from blurred colored circles
    const maskData = bc.getImageData(0,0,qW,qH);
    for(let i=0;i<maskData.data.length;i+=4){
      const lum = (maskData.data[i]*0.299 + maskData.data[i+1]*0.587 + maskData.data[i+2]*0.114)/255;
      maskData.data[i+3] = lum > 0.3 ? Math.round(255*alpha) : 0;
    }
    bc.putImageData(maskData, 0, 0);
  }

  // 4. Composite to target
  if(transparent){
    targetCtx.clearRect(0,0,W,H);
  } else {
    targetCtx.fillStyle = p.bgColor;
    targetCtx.fillRect(0,0,W,H);
  }
  if(p.showSrc && !transparent){
    targetCtx.save(); targetCtx.globalAlpha=0.25;
    targetCtx.drawImage(srcImage,0,0,W,H);
    targetCtx.restore();
  }
  applyTexture(targetCtx, W, H, p);
  targetCtx.save();
  targetCtx.globalCompositeOperation = p.blendMode;
  targetCtx.drawImage(blurred, 0, 0, W, H);
  targetCtx.restore();
}

// ===== Texture =====
function applyTexture(targetCtx, W, H, p){
  if(p.texture==='none' || p.texStr<=0) return;
  const off = document.createElement('canvas');
  off.width=W; off.height=H;
  const oc=off.getContext('2d');
  if(p.texture==='noise'){
    const id=oc.createImageData(W,H);
    for(let i=0;i<id.data.length;i+=4){
      const v=Math.random()*255|0;
      id.data[i]=id.data[i+1]=id.data[i+2]=v; id.data[i+3]=255;
    }
    oc.putImageData(id,0,0);
  } else if(p.texture==='canvas'){
    // Diagonal lines
    oc.strokeStyle='rgba(0,0,0,1)'; oc.lineWidth=1;
    for(let x=-H;x<W+H;x+=4){
      oc.beginPath(); oc.moveTo(x,0); oc.lineTo(x+H,H); oc.stroke();
    }
  } else if(p.texture==='grid'){
    oc.strokeStyle='rgba(0,0,0,1)'; oc.lineWidth=0.5;
    const gs=16;
    for(let x=0;x<W;x+=gs){ oc.beginPath(); oc.moveTo(x,0); oc.lineTo(x,H); oc.stroke(); }
    for(let y=0;y<H;y+=gs){ oc.beginPath(); oc.moveTo(0,y); oc.lineTo(W,y); oc.stroke(); }
  }
  targetCtx.save();
  targetCtx.globalCompositeOperation='multiply';
  targetCtx.globalAlpha=p.texStr;
  targetCtx.drawImage(off,0,0);
  targetCtx.restore();
}

// ===== Main render =====
function scheduleRender(){
  if(!srcImage) return;
  if(rafPending) return;
  rafPending=true;
  requestAnimationFrame(()=>{
    rafPending=false;
    const p = getParams();
    if(mode==='classic'){
      renderClassic(ctx, 1, p, false);
    } else {
      renderLiquid(ctx, 1, p, false);
    }
  });
}

// ===== Watermark =====
function addWatermark(c){
  const wc = c.getContext('2d');
  wc.save();
  wc.globalAlpha = 0.45;
  wc.fillStyle = '#ffffff';
  wc.font = `bold ${Math.max(12, c.width/30)}px sans-serif`;
  wc.textAlign = 'right';
  wc.textBaseline = 'bottom';
  const text = 'stylejoy.art';
  const x = c.width - 12;
  const y = c.height - 10;
  wc.fillStyle = 'rgba(0,0,0,0.4)';
  wc.fillText(text, x+1, y+1);
  wc.fillStyle = 'rgba(255,255,255,0.8)';
  wc.fillText(text, x, y);
  wc.restore();
}

function downloadCanvas(c, filename){
  c.toBlob(blob=>{
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=filename; a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href),10000);
  },'image/png');
}

// ===== SVG build =====
function buildSVG(p){
  if(!cells) cells = buildCells(p);
  const {cells:cl, cs} = cells;
  const blendRgb = hexToRgb(p.blendColor);
  let parts = [`<svg xmlns="http://www.w3.org/2000/svg" width="${outW}" height="${outH}">`];
  parts.push(`<rect width="${outW}" height="${outH}" fill="${p.bgColor}"/>`);
  cl.forEach(cell=>{
    if(cell.skip) return;
    const {c, r, luma} = cell;
    const offsetX=(r%2===0?0:p.rowOffset)*cs;
    const cx=(c*cs+cs/2+offsetX);
    const cy=(r*cs+cs/2);
    const radius=Math.max(0.5,(cs/2)*cell.drawSize*p.density);
    let R=blendRgb[0],G=blendRgb[1],B=blendRgb[2];
    if(p.useOrig){ R=cell.avgR|0; G=cell.avgG|0; B=cell.avgB|0; }
    const fill=`rgb(${R},${G},${B})`;
    if(shape==='circle'){
      parts.push(`<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="${radius.toFixed(1)}" fill="${fill}"/>`);
    } else {
      const s=radius*2;
      parts.push(`<rect x="${(cx-radius).toFixed(1)}" y="${(cy-radius).toFixed(1)}" width="${s.toFixed(1)}" height="${s.toFixed(1)}" fill="${fill}"/>`);
    }
  });
  parts.push('</svg>');
  return parts.join('');
}

// ===== Export =====
async function doExport(type){
  if(!srcImage) return;

  if(type==='svg' && mode==='liquid'){
    alert(lang==='zh'?'SVG 导出仅支持经典网格模式':'SVG export is only available in Classic Grid mode');
    return;
  }

  const needsAuth = (type !== 'png-free');
  if(needsAuth){
    const auth = window.kidartAuth;
    if(!auth || !auth.isLoggedIn){ if(auth&&auth.open) auth.open(); return; }
    if(!auth.hasAccess || !auth.hasAccess()){ if(auth.openPaywall) auth.openPaywall(); return; }
  }

  const p = getParams();

  if(type==='png-free'){
    // Free: cap at 800px long side, add watermark if no access
    const auth = window.kidartAuth;
    const hasAccess = auth && auth.isLoggedIn && auth.hasAccess && auth.hasAccess();
    const maxSide = hasAccess ? outW : Math.min(outW, 800);
    const scale = Math.min(1, maxSide/Math.max(outW,outH));
    const expC = document.createElement('canvas');
    const ec = expC.getContext('2d');
    if(mode==='classic') renderClassic(ec, scale, p, false);
    else renderLiquid(ec, scale, p, false);
    if(!hasAccess) addWatermark(expC);
    downloadCanvas(expC, 'dots-free.png');
    return;
  }

  if(type==='svg'){
    const svgStr = buildSVG(p);
    const blob = new Blob([svgStr],{type:'image/svg+xml'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'dots.svg'; a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href),10000);
    // spend
    if(window.kidartAuth && window.kidartAuth.spend)
      window.kidartAuth.spend({tag:'dots', type:'svg'});
    return;
  }

  const scale = type==='png-hd' ? 2 : 1;
  const transparent = type==='png-alpha';
  const expC = document.createElement('canvas');
  const ec = expC.getContext('2d');
  if(mode==='classic') renderClassic(ec, scale, p, transparent);
  else renderLiquid(ec, scale, p, transparent);

  if(window.kidartAuth && window.kidartAuth.spend){
    const ok = await window.kidartAuth.spend({tag:'dots', type});
    if(!ok) return;
  }
  downloadCanvas(expC, `dots-${type}.png`);
}

document.getElementById('btn-png-free').addEventListener('click',()=>doExport('png-free'));
document.getElementById('btn-png-hd').addEventListener('click',()=>doExport('png-hd'));
document.getElementById('btn-png-alpha').addEventListener('click',()=>doExport('png-alpha'));
document.getElementById('btn-svg').addEventListener('click',()=>doExport('svg'));

})();
