<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shape Text — stylejoy</title>
<link rel="stylesheet" href="/styles.css">
<style>
  /* ---- shape.html 专有样式 ---- */
  #main-canvas{display:block;cursor:crosshair;touch-action:none;border-radius:3px}

  /* canvas hint overlay */
  .canvas-hint{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    color:var(--text-dim);font-size:14px;text-align:center;
    pointer-events:none;line-height:1.7;transition:opacity .3s;
  }
  .canvas-hint.hidden{opacity:0}

  /* aspect ratio buttons (in getrow) */
  .asp-btns{display:flex;gap:5px;flex-shrink:0}
  .asp-btn{
    height:42px;padding:0 12px;border-radius:var(--r);cursor:pointer;
    background:var(--panel-2);border:1px solid var(--line);color:var(--text-dim);
    font-size:12px;font-weight:600;font-family:var(--font);transition:.12s;white-space:nowrap;
  }
  .asp-btn.active,.asp-btn:hover{border-color:var(--accent);color:var(--accent)}

  /* check / toggle rows using shared .check class */
  .check-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .check-row:last-child{margin-bottom:0}

  /* 覆盖 styles.css 的 canvas-wrap/canvas 限制，让画布铺满预览区 */
  #canvas-wrap{max-width:none !important;max-height:none !important}
  #main-canvas{
    width:100% !important;height:100% !important;
    max-width:none !important;max-height:none !important;
  }
  .preview{padding:16px}

  /* textarea */
  #txt-input{
    width:100%;background:var(--panel-2);border:1px solid var(--line);border-radius:8px;
    color:var(--text);font-size:12.5px;font-family:var(--font);
    padding:8px 10px;outline:none;resize:vertical;min-height:80px;line-height:1.5;
  }
  #txt-input:focus{border-color:var(--accent)}
</style>
</head>
<body>
<div class="app">

  <!-- ===== LEFT: canvas stage ===== -->
  <main class="stage" id="stage">
    <div class="leftbar">
      <div class="brand">
        <h1>
          <img src="/stylejoy-logo.svg" class="brand-logo" alt="stylejoy">
          <span class="title-text" data-i18n="shape_title">StyleJoy.art</span>
          <button class="pill" id="lang-toggle">EN</button>
          <button class="pill" id="account-btn">Sign in</button>
        </h1>
        <p data-i18n="shape_subtitle">Draw a shape → fill with text</p>
      </div>
      <div class="getrow">
        <button class="samplebtn fx-btn" id="btn-undo" data-i18n="shape_undo">↩ Undo</button>
        <button class="samplebtn fx-btn" id="btn-clear" data-i18n="shape_clear">Clear</button>
        <div class="asp-btns">
          <button class="asp-btn active" data-asp="1:1">1:1</button>
          <button class="asp-btn" data-asp="4:5">4:5</button>
          <button class="asp-btn" data-asp="9:16">9:16</button>
        </div>
      </div>
    </div>

    <div class="preview">
      <div class="canvas-wrap" id="canvas-wrap">
        <canvas id="main-canvas"></canvas>
        <div class="canvas-hint" id="canvas-hint">
          <b data-i18n="shape_hint_b">Draw a shape</b><br>
          <span data-i18n="shape_hint_s">Click and drag on the canvas</span>
        </div>
      </div>
    </div>
  </main>

  <!-- ===== RIGHT: control panel ===== -->
  <aside class="panel">
    <div class="scroll">

      <!-- Text content -->
      <div class="group">
        <h2><span class="bar"></span><span data-i18n="shape_g_text">Text Content</span></h2>
        <div class="field">
          <textarea id="txt-input" rows="5">To be, or not to be, that is the question: Whether 'tis nobler in the mind to suffer the slings and arrows of outrageous fortune, or to take arms against a sea of troubles and by opposing end them.</textarea>
        </div>
        <button class="btn btn-ghost" id="btn-import-txt" data-i18n="shape_import_txt">Import .txt</button>
        <input type="file" id="file-txt" accept=".txt" hidden>
      </div>

      <!-- Font -->
      <div class="group">
        <h2><span class="bar"></span><span data-i18n="shape_g_font">Font</span></h2>
        <div class="field">
          <div class="row">
            <label data-i18n="shape_f_family">Font family</label>
          </div>
          <select class="sel" id="sel-font">
            <option value="Georgia,serif">Georgia (Serif)</option>
            <option value="'Times New Roman',serif">Times New Roman</option>
            <option value="system-ui,sans-serif">System Sans-Serif</option>
            <option value="'Courier New',monospace">Courier New (Mono)</option>
            <option value="'Noto Serif SC',serif">Noto Serif SC (中文)</option>
          </select>
        </div>
        <button class="btn btn-ghost fx-btn" id="btn-upload-font" style="margin-bottom:14px" data-i18n="shape_upload_font">Upload font (.ttf/.otf) — HD only</button>
        <input type="file" id="file-font" accept=".ttf,.otf,.woff,.woff2" hidden>
        <div class="field">
          <div class="row">
            <label data-i18n="shape_f_weight">Weight</label>
          </div>
          <select class="sel" id="sel-weight">
            <option value="400">Regular (400)</option>
            <option value="700">Bold (700)</option>
          </select>
        </div>
        <div class="field">
          <div class="row">
            <label data-i18n="shape_f_size">Size</label>
            <span class="val" id="v-size">16</span>
          </div>
          <input type="range" id="sl-size" min="6" max="72" value="16">
        </div>
        <div class="field">
          <div class="row">
            <label data-i18n="shape_f_lh">Line height</label>
            <span class="val" id="v-lh">1.40</span>
          </div>
          <input type="range" id="sl-lh" min="80" max="300" value="140">
        </div>
        <div class="field">
          <div class="row">
            <label data-i18n="shape_f_ls">Letter spacing</label>
            <span class="val" id="v-ls">0.0</span>
          </div>
          <input type="range" id="sl-ls" min="-20" max="80" value="0">
        </div>
        <div class="field">
          <div class="row">
            <label data-i18n="shape_f_pad">Padding</label>
            <span class="val" id="v-pad">12</span>
          </div>
          <input type="range" id="sl-pad" min="0" max="80" value="12">
        </div>
      </div>

      <!-- Colors -->
      <div class="group">
        <h2><span class="bar"></span><span data-i18n="shape_g_colors">Colors</span></h2>
        <div class="duo">
          <div class="field">
            <div class="row"><label data-i18n="shape_f_ink">Text</label></div>
            <button class="colorbtn" id="cp-text-btn">
              <span class="chip" id="cp-text-chip" style="background:#1d1b16"></span>
              <span id="cp-text-val">#1d1b16</span>
              <input type="color" id="cp-text" value="#1d1b16">
            </button>
          </div>
          <div class="field">
            <div class="row"><label data-i18n="shape_f_bg">Background</label></div>
            <button class="colorbtn" id="cp-bg-btn">
              <span class="chip" id="cp-bg-chip" style="background:#f4ead2"></span>
              <span id="cp-bg-val">#f4ead2</span>
              <input type="color" id="cp-bg" value="#f4ead2">
            </button>
          </div>
        </div>
        <div class="check-row">
          <label class="check" for="tog-outline">
            <input type="checkbox" id="tog-outline">
            <span data-i18n="shape_outline">Show outline</span>
          </label>
        </div>
        <div class="check-row">
          <label class="check" for="tog-repeat">
            <input type="checkbox" id="tog-repeat" checked>
            <span data-i18n="shape_repeat">Repeat text</span>
          </label>
        </div>
      </div>

      <!-- Export -->
      <div class="group">
        <h2><span class="bar"></span><span data-i18n="shape_g_export">Export</span></h2>
        <button class="btn btn-ghost" id="btn-export-free" style="margin-bottom:8px">
          <span data-i18n="shape_export_free">Export free</span>
          <span style="font-size:11px;color:var(--text-dim);margin-left:4px">1080px · watermark</span>
        </button>
        <button class="btn btn-primary" id="btn-export-hd">
          <span data-i18n="shape_export_hd">Export HD</span>
          <span style="font-size:11px;opacity:.75;margin-left:4px">3000px · no watermark</span>
        </button>
      </div>

    </div>
  </aside>

</div>

<footer id="site-footer">
  <a href="/privacy.html" target="_blank" rel="noopener">Privacy</a>
  <span class="sep">·</span>
  <a href="/terms.html" target="_blank" rel="noopener">Terms</a>
  <span class="sep">·</span>
  <span>© 2026 stylejoy</span>
</footer>

<script src="/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/auth.js"></script>
<script>
(function(){
'use strict';

// ===== i18n =====
const SHAPE_I18N = {
  zh:{
    shape_title:'StyleJoy.art', shape_subtitle:'绘制区域 · 文字填充',
    shape_hint_b:'绘制一个形状', shape_hint_s:'在画布上点击并拖动',
    shape_undo:'↩ 撤销', shape_clear:'清除',
    shape_g_text:'文字内容', shape_import_txt:'导入 .txt 文件',
    shape_g_font:'字体', shape_f_family:'字体系列', shape_upload_font:'上传字体（.ttf/.otf）— 仅高清',
    shape_f_weight:'字重', shape_f_size:'字号', shape_f_lh:'行高', shape_f_ls:'字间距', shape_f_pad:'边距',
    shape_g_colors:'颜色', shape_f_ink:'文字颜色', shape_f_bg:'背景颜色',
    shape_outline:'显示轮廓', shape_repeat:'循环填充文字',
    shape_g_export:'导出', shape_export_free:'免费导出', shape_export_hd:'高清导出',
  },
  en:{
    shape_title:'StyleJoy.art', shape_subtitle:'Draw a shape → fill with text',
    shape_hint_b:'Draw a shape', shape_hint_s:'Click and drag on the canvas',
    shape_undo:'↩ Undo', shape_clear:'Clear',
    shape_g_text:'Text Content', shape_import_txt:'Import .txt',
    shape_g_font:'Font', shape_f_family:'Font family', shape_upload_font:'Upload font (.ttf/.otf) — HD only',
    shape_f_weight:'Weight', shape_f_size:'Size', shape_f_lh:'Line height', shape_f_ls:'Letter spacing', shape_f_pad:'Padding',
    shape_g_colors:'Colors', shape_f_ink:'Text', shape_f_bg:'Background',
    shape_outline:'Show outline', shape_repeat:'Repeat text',
    shape_g_export:'Export', shape_export_free:'Export free', shape_export_hd:'Export HD',
  },
};
let lang = 'en';
try{ const s = localStorage.getItem('ri_lang'); if(s==='zh'||s==='en') lang=s; }catch(e){}

function t(key){ return (SHAPE_I18N[lang]||SHAPE_I18N.en)[key] || key; }
function applyShapeLang(){
  document.documentElement.lang = lang==='zh' ? 'zh-CN' : 'en';
  document.querySelectorAll('[data-i18n]').forEach(el=>{ el.textContent = t(el.dataset.i18n); });
  const lt = document.getElementById('lang-toggle');
  if(lt) lt.textContent = lang==='zh' ? 'EN' : '中';
}

const langToggle = document.getElementById('lang-toggle');
if(langToggle){
  langToggle.addEventListener('click', ()=>{
    lang = lang==='zh' ? 'en' : 'zh';
    try{ localStorage.setItem('ri_lang', lang); }catch(e){}
    applyShapeLang();
    // also update auth modal lang if present
    if(window.kidartAuth && window.kidartAuth.refresh) {
      // trigger auth.js applyAuthLang via click timing
      setTimeout(()=>{ document.querySelectorAll('[data-i18n2]').forEach(el=>{
        /* auth.js will handle these on next openModal call */
      }); }, 0);
    }
  });
}

// ===== Constants =====
const LOGICAL = 800;
const MIN_DIST = 6;

// ===== State =====
let paths = [];
let currentPath = null;
let uploadedFont = null;
let renderTimer = null;

// ===== Canvas setup =====
const wrap   = document.getElementById('canvas-wrap');
const canvas = document.getElementById('main-canvas');
const ctx    = canvas.getContext('2d');
const hint   = document.getElementById('canvas-hint');

let aspectW = 1, aspectH = 1;
let canvasW = LOGICAL, canvasH = LOGICAL;

function fitCanvas(){
  const preview = wrap.parentElement;
  const pad = 16;
  const maxW = preview.clientWidth  - pad * 2;
  const maxH = preview.clientHeight - pad * 2;
  if(maxW <= 0 || maxH <= 0) return;
  const scale = Math.min(maxW / canvasW, maxH / canvasH);
  wrap.style.width  = Math.round(canvasW * scale) + 'px';
  wrap.style.height = Math.round(canvasH * scale) + 'px';
}

function setAspect(ratio){
  const [w,h] = ratio.split(':').map(Number);
  aspectW = w; aspectH = h;
  canvasW = LOGICAL;
  canvasH = Math.round(LOGICAL * h / w);
  canvas.width  = canvasW;
  canvas.height = canvasH;
  fitCanvas();
  scheduleRender();
}

document.querySelectorAll('.asp-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.asp-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    setAspect(btn.dataset.asp);
  });
});

// ===== Controls =====
const slSize    = document.getElementById('sl-size');
const slLH      = document.getElementById('sl-lh');
const slLS      = document.getElementById('sl-ls');
const slPad     = document.getElementById('sl-pad');
const vSize     = document.getElementById('v-size');
const vLH       = document.getElementById('v-lh');
const vLS       = document.getElementById('v-ls');
const vPad      = document.getElementById('v-pad');
const selFont   = document.getElementById('sel-font');
const selWeight = document.getElementById('sel-weight');
const cpText    = document.getElementById('cp-text');
const cpBg      = document.getElementById('cp-bg');
const togOutline= document.getElementById('tog-outline');
const togRepeat = document.getElementById('tog-repeat');
const txtInput  = document.getElementById('txt-input');

// colorbtn chip + value sync
function syncColorBtn(colorInput, chipEl, valEl){
  chipEl.style.background = colorInput.value;
  valEl.textContent = colorInput.value;
}
cpText.addEventListener('input', ()=>{ syncColorBtn(cpText, document.getElementById('cp-text-chip'), document.getElementById('cp-text-val')); scheduleRender(); });
cpBg.addEventListener('input',   ()=>{ syncColorBtn(cpBg,   document.getElementById('cp-bg-chip'),   document.getElementById('cp-bg-val'));   scheduleRender(); });

function getParams(){
  return {
    fontSize:      parseInt(slSize.value),
    lineHeight:    parseInt(slLH.value)/100,
    letterSpacing: parseInt(slLS.value)/10,
    padding:       parseInt(slPad.value),
    fontFamily:    uploadedFont ? uploadedFont.family : selFont.value,
    fontWeight:    selWeight.value,
    textColor:     cpText.value,
    bgColor:       cpBg.value,
    outline:       togOutline.checked,
    repeat:        togRepeat.checked,
    text:          txtInput.value || ' ',
  };
}

function scheduleRender(){
  clearTimeout(renderTimer);
  renderTimer = setTimeout(render, 120);
}

[slSize,slLH,slLS,slPad].forEach(el=>{
  el.addEventListener('input', ()=>{
    vSize.textContent = slSize.value;
    vLH.textContent   = (parseInt(slLH.value)/100).toFixed(2);
    vLS.textContent   = (parseInt(slLS.value)/10).toFixed(1);
    vPad.textContent  = slPad.value;
    scheduleRender();
  });
});
[selFont,selWeight,togOutline,togRepeat,txtInput].forEach(el=>{
  el.addEventListener('input',  scheduleRender);
  el.addEventListener('change', scheduleRender);
});

// ===== Drawing =====
function toNorm(clientX, clientY){
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvasW / rect.width;
  const scaleY = canvasH / rect.height;
  return {
    x: ((clientX - rect.left) * scaleX) / canvasW,
    y: ((clientY - rect.top)  * scaleY) / canvasH,
  };
}
function dist2(a,b){ return (a.x-b.x)**2 + (a.y-b.y)**2; }

function startDraw(e){
  e.preventDefault();
  const pt = e.touches ? toNorm(e.touches[0].clientX, e.touches[0].clientY) : toNorm(e.clientX, e.clientY);
  currentPath = [pt];
}
function moveDraw(e){
  if(!currentPath) return;
  e.preventDefault();
  const pt = e.touches ? toNorm(e.touches[0].clientX, e.touches[0].clientY) : toNorm(e.clientX, e.clientY);
  const last = currentPath[currentPath.length-1];
  const minD = (MIN_DIST/canvasW)**2;
  if(dist2(pt,last) > minD) currentPath.push(pt);
  renderLive();
}
function endDraw(e){
  if(!currentPath || currentPath.length < 3){ currentPath=null; return; }
  currentPath.push(currentPath[0]);
  paths.push(currentPath);
  currentPath = null;
  if(paths.length===1 && hint) hint.classList.add('hidden');
  scheduleRender();
}

canvas.addEventListener('mousedown',  startDraw);
canvas.addEventListener('mousemove',  moveDraw);
canvas.addEventListener('mouseup',    endDraw);
canvas.addEventListener('mouseleave', endDraw);
canvas.addEventListener('touchstart', startDraw, {passive:false});
canvas.addEventListener('touchmove',  moveDraw,  {passive:false});
canvas.addEventListener('touchend',   endDraw);

function renderLive(){
  const p = getParams();
  ctx.fillStyle = p.bgColor;
  ctx.fillRect(0,0,canvasW,canvasH);
  drawAllPaths(ctx, canvasW, canvasH, true);
  if(currentPath && currentPath.length>1){
    ctx.strokeStyle = '#888';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([4,4]);
    ctx.beginPath();
    currentPath.forEach((pt,i)=>{ const x=pt.x*canvasW,y=pt.y*canvasH; i===0?ctx.moveTo(x,y):ctx.lineTo(x,y); });
    ctx.stroke();
    ctx.setLineDash([]);
  }
}

// ===== Undo / Clear =====
document.getElementById('btn-undo').addEventListener('click', ()=>{
  paths.pop();
  if(paths.length===0 && hint) hint.classList.remove('hidden');
  scheduleRender();
});
document.getElementById('btn-clear').addEventListener('click', ()=>{
  paths=[]; currentPath=null;
  if(hint) hint.classList.remove('hidden');
  scheduleRender();
});

// ===== Font upload (premium) =====
document.getElementById('btn-upload-font').addEventListener('click', async ()=>{
  if(!window.kidartAuth){ return; }
  const ok = await window.kidartAuth.requireAccess();
  if(!ok) return;
  document.getElementById('file-font').click();
});
document.getElementById('file-font').addEventListener('change', async (e)=>{
  const file = e.target.files[0]; if(!file) return;
  try{
    const buf = await file.arrayBuffer();
    const family = 'UserFont_' + Date.now();
    const ff = new FontFace(family, buf);
    await ff.load();
    document.fonts.add(ff);
    uploadedFont = ff;
    const opt = document.createElement('option');
    opt.value = family; opt.textContent = file.name; opt.selected = true;
    selFont.appendChild(opt);
    scheduleRender();
  }catch(err){ alert('Font load failed: ' + err.message); }
  e.target.value='';
});

// ===== TXT import =====
document.getElementById('btn-import-txt').addEventListener('click', ()=>{
  document.getElementById('file-txt').click();
});
document.getElementById('file-txt').addEventListener('change', (e)=>{
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ev=>{ txtInput.value = ev.target.result; scheduleRender(); };
  reader.readAsText(file);
  e.target.value='';
});

// ===== Scanline fill =====
function buildMask(offCtx, w, h){
  offCtx.clearRect(0,0,w,h);
  offCtx.fillStyle = '#000';
  if(paths.length===0) return;
  offCtx.beginPath();
  paths.forEach(path=>{
    path.forEach((pt,i)=>{
      const x=pt.x*w, y=pt.y*h;
      i===0 ? offCtx.moveTo(x,y) : offCtx.lineTo(x,y);
    });
  });
  offCtx.fill('nonzero');
}

function scanlineFill(targetCtx, w, h, params){
  const { fontSize, lineHeight, letterSpacing, padding, fontFamily, fontWeight, textColor, repeat, text } = params;
  const lineStep = fontSize * lineHeight;

  const offCvs = document.createElement('canvas');
  offCvs.width = w; offCvs.height = h;
  const offCtx = offCvs.getContext('2d');
  buildMask(offCtx, w, h);
  const pxData = offCtx.getImageData(0, 0, w, h).data;

  let minY=h, maxY=0;
  for(let y=0;y<h;y++){
    for(let x=0;x<w;x++){
      if(pxData[(y*w+x)*4+3]>128){ if(y<minY)minY=y; if(y>maxY)maxY=y; break; }
    }
  }
  if(minY>maxY) return;

  targetCtx.save();
  targetCtx.fillStyle = textColor;
  targetCtx.font = `${fontWeight} ${fontSize}px ${fontFamily}`;
  targetCtx.textBaseline = 'top';

  let charIdx = 0;
  const chars = [...text];
  if(chars.length===0){ targetCtx.restore(); return; }

  for(let y = minY + padding + fontSize*0.1; y < maxY - padding; y += lineStep){
    const rowY = Math.round(y);
    if(rowY < 0 || rowY >= h) continue;

    const spans = [];
    let inside = false, spanStart = 0;
    for(let x=0;x<w;x++){
      const inMask = pxData[(rowY*w+x)*4+3]>128;
      if(inMask && !inside){ inside=true; spanStart=x; }
      if(!inMask && inside){ inside=false; spans.push([spanStart+padding, x-padding]); }
    }
    if(inside) spans.push([spanStart+padding, w-padding]);

    for(const [sx, ex] of spans){
      if(ex-sx < fontSize) continue;
      let x = sx;
      while(x < ex){
        if(charIdx >= chars.length){
          if(!repeat) break;
          charIdx = 0;
        }
        const ch = chars[charIdx];
        const cw = targetCtx.measureText(ch).width + letterSpacing;
        if(x + cw > ex) break;
        targetCtx.fillText(ch, x, rowY);
        x += cw;
        charIdx++;
      }
    }
  }
  targetCtx.restore();
}

// ===== Draw paths outline =====
function drawAllPaths(targetCtx, w, h, showOutline){
  if(paths.length===0) return;
  if(!showOutline) return;
  targetCtx.save();
  targetCtx.strokeStyle = 'rgba(0,0,0,0.2)';
  targetCtx.lineWidth = 1;
  targetCtx.setLineDash([]);
  paths.forEach(path=>{
    targetCtx.beginPath();
    path.forEach((pt,i)=>{
      const x=pt.x*w, y=pt.y*h;
      i===0 ? targetCtx.moveTo(x,y) : targetCtx.lineTo(x,y);
    });
    targetCtx.closePath();
    targetCtx.stroke();
  });
  targetCtx.restore();
}

// ===== Main render =====
function render(){
  const p = getParams();
  ctx.fillStyle = p.bgColor;
  ctx.fillRect(0,0,canvasW,canvasH);
  if(paths.length > 0){
    scanlineFill(ctx, canvasW, canvasH, p);
    drawAllPaths(ctx, canvasW, canvasH, p.outline);
  }
}

// ===== Watermark =====
function addWatermark(targetCtx, w, h){
  targetCtx.save();
  const size = Math.max(12, Math.round(w * 0.018));
  targetCtx.font = `600 ${size}px system-ui,sans-serif`;
  targetCtx.textBaseline = 'bottom';
  targetCtx.fillStyle = 'rgba(0,0,0,0.25)';
  const pad = Math.round(w * 0.015);
  targetCtx.fillText('stylejoy.art', w - targetCtx.measureText('stylejoy.art').width - pad, h - pad);
  targetCtx.restore();
}

// ===== Export =====
async function doExport(free){
  if(!free){
    if(!window.kidartAuth){ return; }
    const ok = await window.kidartAuth.requireAccess();
    if(!ok) return;
  }

  const p = getParams();
  const targetLong = free ? 1080 : 3000;
  const scale = targetLong / Math.max(canvasW, canvasH);
  const tw = Math.round(canvasW * scale);
  const th = Math.round(canvasH * scale);

  const offCvs = document.createElement('canvas');
  offCvs.width = tw; offCvs.height = th;
  const offCtx = offCvs.getContext('2d');

  const ep = Object.assign({}, p, {
    fontSize:      p.fontSize * scale,
    letterSpacing: p.letterSpacing * scale,
    padding:       p.padding * scale,
  });

  offCtx.fillStyle = p.bgColor;
  offCtx.fillRect(0,0,tw,th);

  if(paths.length > 0){
    scanlineFill(offCtx, tw, th, ep);
    drawAllPaths(offCtx, tw, th, p.outline);
  }

  if(free) addWatermark(offCtx, tw, th);

  if(!free){
    const spec = { w:tw, h:th, dpi:0, mode:'shape', tag:'shape' };
    const spent = await window.kidartAuth.spend(spec);
    if(!spent){ window.kidartAuth.openPaywall(); return; }
  }

  offCvs.toBlob(blob=>{
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = free ? 'shape-text-free.png' : 'shape-text-hd.png';
    a.click();
    setTimeout(()=>URL.revokeObjectURL(url), 2000);
  }, 'image/png');
}

document.getElementById('btn-export-free').addEventListener('click', ()=>doExport(true));
document.getElementById('btn-export-hd').addEventListener('click',   ()=>doExport(false));

// ===== Init =====
applyShapeLang();
setAspect('1:1');
render();

// Resize: re-fit canvas display size (keeps logical resolution intact)
window.addEventListener('resize', fitCanvas);

})();
</script>
