<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="stylejoy logo">
  <!-- 背景：朱红圆角方块（品牌主色 #e8623a） -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="#e8623a"/>

  <!-- 花朵标记：金黄层（错位偏移，模拟 riso 套色错位的标志性效果） -->
  <g transform="translate(264 264)" fill="#f0b429">
    <g>
      <ellipse cx="0" cy="-96" rx="46" ry="86"/>
      <ellipse cx="0" cy="-96" rx="46" ry="86" transform="rotate(60)"/>
      <ellipse cx="0" cy="-96" rx="46" ry="86" transform="rotate(120)"/>
      <ellipse cx="0" cy="-96" rx="46" ry="86" transform="rotate(180)"/>
      <ellipse cx="0" cy="-96" rx="46" ry="86" transform="rotate(240)"/>
      <ellipse cx="0" cy="-96" rx="46" ry="86" transform="rotate(300)"/>
    </g>
    <circle cx="0" cy="0" r="46"/>
  </g>

  <!-- 花朵标记：奶白主层（在金黄层之上，边缘露出金黄=riso 质感） -->
  <g transform="translate(256 256)" fill="#f3eee0">
    <g>
      <ellipse cx="0" cy="-96" rx="46" ry="86"/>
      <ellipse cx="0" cy="-96" rx="46" ry="86" transform="rotate(60)"/>
      <ellipse cx="0" cy="-96" rx="46" ry="86" transform="rotate(120)"/>
      <ellipse cx="0" cy="-96" rx="46" ry="86" transform="rotate(180)"/>
      <ellipse cx="0" cy="-96" rx="46" ry="86" transform="rotate(240)"/>
      <ellipse cx="0" cy="-96" rx="46" ry="86" transform="rotate(300)"/>
    </g>
    <!-- 花心：朱红，呼应背景，形成"印孔"效果 -->
    <circle cx="0" cy="0" r="46" fill="#e8623a"/>
    <circle cx="0" cy="0" r="22" fill="#f3eee0"/>
  </g>
</svg>
