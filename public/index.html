<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>复古肌理插画生成器</title>
<style>
  :root{
    --ink:#16140f;
    --panel:#1d1b16;
    --panel-2:#26231c;
    --line:#37322a;
    --paper:#e9e3d4;
    --paper-2:#d8d0bd;
    --text:#efe9da;
    --text-dim:#a9a193;
    --accent:#e8623a;     /* riso 朱红 */
    --accent-2:#f0b429;   /* riso 金黄 */
    --r:10px;
    --font:"Helvetica Neue",-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:var(--font);
    background:var(--ink);
    color:var(--text);
    -webkit-font-smoothing:antialiased;
    overflow:hidden;
  }
  .app{display:flex;height:100vh;width:100vw}

  /* ---------- 右侧：控制面板（窄，可滚动） ---------- */
  .panel{
    width:372px;flex:0 0 372px;
    background:var(--panel);
    border-left:1px solid var(--line);
    display:flex;flex-direction:column;
    height:100%;
  }
  /* 左侧顶部：品牌 + 语言切换 */
  .leftbar{flex:0 0 auto;border-bottom:1px solid var(--line)}
  .brand{padding:16px 22px 12px}
  .brand h1{
    font-size:16px;font-weight:800;letter-spacing:.04em;
    display:flex;align-items:center;gap:9px;
  }
  .brand .dot{
    width:13px;height:13px;border-radius:3px;
    background:var(--accent);
    box-shadow:4px 0 0 var(--accent-2);
    transform:translateX(-2px);
  }
  .brand p{font-size:11px;color:var(--text-dim);margin-top:6px;letter-spacing:.02em}

  .scroll{flex:1;overflow-y:auto;padding:4px 0 24px}
  .scroll::-webkit-scrollbar{width:8px}
  .scroll::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px}

  .group{border-bottom:1px solid var(--line);padding:16px 20px}
  .group h2{
    font-size:11px;font-weight:700;letter-spacing:.12em;
    color:var(--text-dim);text-transform:uppercase;
    margin-bottom:14px;display:flex;align-items:center;gap:7px;
  }
  .group h2 .bar{width:14px;height:2px;background:var(--accent)}

  .field{margin-bottom:15px}
  .field:last-child{margin-bottom:0}
  .field .row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px}
  .field label{font-size:12.5px;color:var(--text)}
  .field .val{font-size:12px;color:var(--accent-2);font-variant-numeric:tabular-nums;font-weight:600}

  input[type=range]{
    -webkit-appearance:none;width:100%;height:3px;border-radius:3px;
    background:var(--line);outline:none;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;width:15px;height:15px;border-radius:50%;
    background:var(--paper);cursor:pointer;border:3px solid var(--accent);
    transition:transform .1s;
  }
  input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.15)}
  input[type=range]::-moz-range-thumb{
    width:15px;height:15px;border-radius:50%;background:var(--paper);
    cursor:pointer;border:3px solid var(--accent)}

  /* 获取图片：紧凑上传条 + 载入示例（并排一行） */
  .getrow{display:flex;gap:10px;padding:0 22px 16px}
  .drop{
    flex:1;display:flex;align-items:center;justify-content:center;gap:8px;
    height:42px;padding:0 12px;cursor:pointer;white-space:nowrap;
    border:1.5px dashed var(--line);border-radius:var(--r);
    background:var(--panel-2);color:var(--text-dim);font-size:12.5px;transition:.15s;
  }
  .drop:hover,.drop.over{border-color:var(--accent);color:var(--text);background:#2c2820}
  .drop .ico{font-size:16px;opacity:.75}
  .drop b{color:var(--text);font-size:12.5px;font-weight:600}
  .samplebtn{
    flex:1;display:flex;align-items:center;justify-content:center;gap:7px;
    height:42px;border-radius:var(--r);cursor:pointer;white-space:nowrap;
    background:var(--panel-2);border:1px solid var(--line);color:var(--text);
    font-size:12.5px;font-weight:600;font-family:var(--font);transition:.12s;
  }
  .samplebtn:hover{border-color:var(--accent)}

  /* 调色板 */
  .swatches{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
  .sw{position:relative;width:48px;height:40px;border-radius:8px;
    border:2px solid rgba(255,255,255,.12);cursor:pointer;overflow:hidden;
    transition:transform .1s}
  .sw:hover{transform:translateY(-2px)}
  .sw input{position:absolute;inset:0;opacity:0;cursor:pointer}
  .sw .n{position:absolute;top:2px;left:4px;font-size:9px;font-weight:700;
    color:#fff;mix-blend-mode:difference}

  .duo{display:flex;gap:10px}
  .duo .field{flex:1}
  .colorbtn{display:flex;align-items:center;gap:8px;width:100%;
    background:var(--panel-2);border:1px solid var(--line);border-radius:8px;
    padding:7px 9px;cursor:pointer;position:relative}
  .colorbtn .chip{width:20px;height:20px;border-radius:5px;border:1px solid rgba(255,255,255,.15)}
  .colorbtn span{font-size:12px}
  .colorbtn input{position:absolute;inset:0;opacity:0;cursor:pointer}

  select.sel{width:100%;background:var(--panel-2);border:1px solid var(--line);
    color:var(--text);border-radius:8px;padding:8px 9px;font-size:12.5px;
    font-family:var(--font);cursor:pointer;-webkit-appearance:none;appearance:none;
    background-image:linear-gradient(45deg,transparent 50%,var(--text-dim) 50%),
      linear-gradient(135deg,var(--text-dim) 50%,transparent 50%);
    background-position:calc(100% - 16px) 16px,calc(100% - 11px) 16px;
    background-size:5px 5px,5px 5px;background-repeat:no-repeat}
  select.sel:focus{outline:none;border-color:var(--accent)}
  .hint-text{font-size:11px;color:var(--text-dim);line-height:1.6;margin-top:-2px}

  .mini-label{display:block;margin-bottom:7px;font-size:12px;color:var(--text)}
  /* 模式切换 */
  .tabs{display:flex;background:var(--panel-2);border:1px solid var(--line);
    border-radius:9px;padding:3px;margin-bottom:14px;gap:2px}
  .tab{flex:1;border:none;background:transparent;color:var(--text-dim);
    font-size:12.5px;font-weight:600;padding:8px 4px;border-radius:6px;cursor:pointer;
    font-family:var(--font);transition:.12s}
  .tab.active{background:var(--accent);color:#fff}
  .exp-panel[hidden]{display:none}
  /* 社交预设卡片 */
  .preset-grid{display:flex;flex-direction:column;gap:8px}
  .preset-btn{display:flex;align-items:center;justify-content:space-between;width:100%;
    background:var(--panel-2);border:1px solid var(--line);border-radius:9px;
    padding:9px 11px;cursor:pointer;transition:.12s;font-family:var(--font)}
  .preset-btn:hover{border-color:var(--text-dim)}
  .preset-btn.active{border-color:var(--accent);background:#2c2820}
  .preset-left{display:flex;align-items:center;gap:11px}
  .preset-btn .pratio{flex:0 0 auto;border:1.5px solid var(--text-dim);border-radius:2px;background:#0000}
  .preset-btn.active .pratio{border-color:var(--accent-2)}
  .preset-btn .pname{font-size:13px;color:var(--text);font-weight:600}
  .preset-btn .pdim{font-size:11px;color:var(--text-dim);font-variant-numeric:tabular-nums}
  /* 分段按钮 */
  .seg{display:flex;gap:6px}
  .seg button{flex:1;background:var(--panel-2);border:1px solid var(--line);color:var(--text-dim);
    font-size:11.5px;font-weight:600;padding:8px 4px;border-radius:7px;cursor:pointer;
    font-family:var(--font);transition:.12s;white-space:nowrap}
  .seg button.active{border-color:var(--accent);color:var(--text);background:#2c2820}
  /* 规格回显 */
  .readout{margin-top:14px;background:var(--panel-2);border:1px solid var(--line);
    border-radius:9px;padding:11px 13px;line-height:1.5}
  .readout .big{font-size:14px;color:var(--text);font-weight:700;font-variant-numeric:tabular-nums}
  .readout .big b{color:var(--accent-2)}
  .readout .sub{color:var(--text-dim);font-size:11px;margin-top:4px}

  .presets{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:13px}
  .preset{display:flex;border-radius:7px;overflow:hidden;cursor:pointer;
    border:2px solid transparent;transition:.12s;height:26px}
  .preset:hover{border-color:var(--paper)}
  .preset i{width:15px;height:100%}

  .btn{
    width:100%;border:none;border-radius:9px;padding:11px;cursor:pointer;
    font-size:13px;font-weight:700;font-family:var(--font);letter-spacing:.03em;
    transition:.12s;
  }
  .btn-primary{background:var(--accent);color:#fff}
  .btn-primary:hover{background:#f06f48}
  .btn-ghost{background:var(--panel-2);color:var(--text);border:1px solid var(--line)}
  .btn-ghost:hover{border-color:var(--text-dim)}
  .btn-row{display:flex;gap:9px}
  .btn-row .btn{flex:1}

  .check{display:flex;align-items:center;gap:9px;cursor:pointer;font-size:12.5px}
  .check input{width:16px;height:16px;accent-color:var(--accent)}

  /* ---------- 左侧：图片预览主区（宽） ---------- */
  .stage{
    flex:1;min-width:0;position:relative;
    display:flex;flex-direction:column;
    background:radial-gradient(circle at 30% 18%, #211e18, var(--ink) 70%);
    overflow:hidden;
  }
  .preview{flex:1;min-height:0;position:relative;
    display:flex;align-items:center;justify-content:center;padding:30px}
  .canvas-wrap{
    position:relative;max-width:100%;
    max-height:var(--canvas-maxh, calc(100vh - 210px));
    box-shadow:0 30px 80px rgba(0,0,0,.55), 0 0 0 1px rgba(255,255,255,.05);
    border-radius:3px;background:#fff;
  }
  canvas{display:block;max-width:100%;
    max-height:var(--canvas-maxh, calc(100vh - 210px));border-radius:3px}
  .empty-hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    color:var(--text-dim);font-size:14px;text-align:center;
    pointer-events:none;line-height:1.7}
  .empty-hint b{color:var(--text);font-size:16px}

  .badge{position:absolute;bottom:10px;right:10px;
    background:rgba(0,0,0,.55);color:#fff;font-size:10px;padding:3px 8px;
    border-radius:5px;font-variant-numeric:tabular-nums;letter-spacing:.04em}

  .loader{position:absolute;inset:0;display:none;align-items:center;justify-content:center;
    background:rgba(22,20,15,.6);backdrop-filter:blur(2px);z-index:5;
    flex-direction:column;gap:14px;color:var(--text);font-size:13px}
  .loader.show{display:flex}
  .spin{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--accent);
    border-radius:50%;animation:sp .7s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}

  /* 语言切换：标题行内右对齐 */
  .pill{background:var(--panel-2);border:1px solid var(--line);
    color:var(--text);font-size:12px;padding:6px 12px;border-radius:20px;cursor:pointer;
    font-weight:600;transition:.12s}
  .pill:hover{border-color:var(--accent)}
  #lang-toggle{margin-left:auto;min-width:42px;text-align:center;font-weight:700}

  @media (max-width:820px){
    html,body{overflow:auto}
    .app{flex-direction:column;height:auto;min-height:100vh}
    .stage{flex:0 0 auto}
    .preview{min-height:48vh;padding:16px}
    .panel{width:100%;flex:0 0 auto;height:auto;border-left:none;border-top:1px solid var(--line)}
    .scroll{flex:0 0 auto;overflow:visible}
    .brand{padding:14px 18px 10px}
    .getrow{padding:0 18px 14px}
  }
</style>
</head>
<body>
<div class="app">
  <!-- 左侧：图片预览主区 -->
  <main class="stage" id="stage">
    <div class="leftbar">
      <div class="brand">
        <h1><span class="dot"></span><span class="title-text" data-i18n="title">复古肌理插画生成器</span><button class="pill" id="lang-toggle">EN</button></h1>
        <p data-i18n="subtitle">照片 → Riso 孔版风格装饰画</p>
      </div>
      <div class="getrow">
        <div class="drop" id="drop">
          <span class="ico">⇪</span>
          <b data-i18n="drop_title">上传 / 拖入照片</b>
          <input type="file" id="file" accept="image/*" hidden>
        </div>
        <button class="samplebtn" id="sample" data-i18n="pill_sample">载入示例</button>
      </div>
    </div>
    <div class="preview">
      <div class="canvas-wrap" id="wrap" style="display:none">
        <canvas id="cv"></canvas>
        <div class="badge" id="badge"></div>
      </div>
      <div class="empty-hint" id="hint">
        <b data-i18n="empty_b">从左上角上传一张照片</b><br>
        <span data-i18n="empty_l2">花卉、人像、静物、风景都可以</span><br>
        <span data-i18n="empty_l3">建议主体清晰、背景简单</span>
      </div>
      <div class="loader" id="loader"><div class="spin"></div><span id="loadtext">正在分区…</span></div>
    </div>
  </main>

  <!-- 右侧：控制面板 -->
  <aside class="panel">
    <div class="scroll">

      <!-- 分区 -->
      <div class="group">
        <h2><span class="bar"></span><span data-i18n="g_seg">分区生成</span></h2>
        <div class="field">
          <div class="row"><label data-i18n="f_colors">色块数量</label><span class="val" id="v-colors">4</span></div>
          <input type="range" id="colors" min="2" max="8" step="1" value="4">
        </div>
        <div class="field">
          <div class="row"><label data-i18n="f_contrast">对比度</label><span class="val" id="v-contrast">1.0×</span></div>
          <input type="range" id="contrast" min="0.5" max="2.2" step="0.1" value="1">
        </div>
        <div class="field">
          <div class="row"><label data-i18n="f_smooth">区域平滑</label><span class="val" id="v-smooth">4</span></div>
          <input type="range" id="smooth" min="0" max="8" step="1" value="4">
        </div>
        <button class="btn btn-ghost" id="resegment" style="margin-top:4px" data-i18n="btn_reseg">↻ 重新分区</button>
      </div>

      <!-- 描边与肌理 -->
      <div class="group">
        <h2><span class="bar"></span><span data-i18n="g_outline">描边与肌理</span></h2>
        <div class="field">
          <div class="row"><label data-i18n="f_thick">轮廓粗细</label><span class="val" id="v-thick">4</span></div>
          <input type="range" id="thick" min="0" max="10" step="1" value="4">
        </div>
        <div class="field">
          <div class="row"><label data-i18n="f_rough">边缘毛糙（喷溅）</label><span class="val" id="v-rough">55%</span></div>
          <input type="range" id="rough" min="0" max="100" step="1" value="55">
        </div>
        <div class="field">
          <div class="row"><label data-i18n="f_grain">颗粒肌理</label><span class="val" id="v-grain">30%</span></div>
          <input type="range" id="grain" min="0" max="100" step="1" value="30">
        </div>
        <div class="field">
          <div class="row"><label data-i18n="f_paper">纸张纹理</label><span class="val" id="v-paper">25%</span></div>
          <input type="range" id="paper" min="0" max="100" step="1" value="25">
        </div>
      </div>

      <!-- 配色 -->
      <div class="group">
        <h2><span class="bar"></span><span data-i18n="g_colors">色彩控制</span></h2>
        <div class="presets" id="presets"></div>
        <div class="swatches" id="swatches"></div>
        <button class="btn btn-ghost" id="random" style="margin-bottom:13px" data-i18n="btn_random">🎲 随机配色</button>
        <div class="duo">
          <div class="field">
            <label style="display:block;margin-bottom:6px;font-size:12px" data-i18n="f_inkcolor">轮廓颜色</label>
            <div class="colorbtn"><span class="chip" id="ink-chip"></span><span id="ink-label">#16140f</span>
              <input type="color" id="ink" value="#16140f"></div>
          </div>
          <div class="field">
            <label style="display:block;margin-bottom:6px;font-size:12px" data-i18n="f_papercolor">纸张颜色</label>
            <div class="colorbtn"><span class="chip" id="bg-chip"></span><span id="bg-label">#e9e3d4</span>
              <input type="color" id="bg" value="#e9e3d4"></div>
          </div>
        </div>
      </div>

      <!-- 画面留白 -->
      <div class="group">
        <h2><span class="bar"></span><span data-i18n="g_margin">画面留白</span></h2>
        <div class="field">
          <div class="row"><label data-i18n="f_margin">留白边距</label><span class="val" id="v-margin">6%</span></div>
          <input type="range" id="margin" min="0" max="40" step="1" value="6">
        </div>
        <p class="hint-text" data-i18n="hint_margin">边距用「纸张颜色」填充。想要纯净留白把纸张设为白色；想让背景延伸到边缘，把纸张设成接近背景色。画面比例由下方「导出」按用途自动决定。</p>
      </div>

      <!-- 导出 -->
      <div class="group" style="border-bottom:none">
        <h2><span class="bar"></span><span data-i18n="g_export">导出</span></h2>

        <div class="tabs" id="exp-tabs">
          <button class="tab active" data-mode="social" data-i18n="tab_social">社交媒体</button>
          <button class="tab" data-mode="print" data-i18n="tab_print">打印</button>
          <button class="tab" data-mode="custom" data-i18n="tab_custom">自定义</button>
        </div>

        <!-- 社交 -->
        <div class="exp-panel" data-panel="social">
          <div class="preset-grid" id="social-grid"></div>
        </div>

        <!-- 打印 -->
        <div class="exp-panel" data-panel="print" hidden>
          <div class="field">
            <label class="mini-label" data-i18n="f_framesize">画框尺寸</label>
            <select id="papersize" class="sel"></select>
          </div>
          <div class="field">
            <label class="mini-label" data-i18n="f_orient">方向</label>
            <div class="seg" id="orient">
              <button data-v="portrait" class="active" data-i18n="orient_portrait">竖版</button>
              <button data-v="landscape" data-i18n="orient_landscape">横版</button>
            </div>
          </div>
          <div class="field">
            <label class="mini-label" data-i18n="f_quality">打印精度</label>
            <div class="seg" id="dpi">
              <button data-v="150" data-i18n="dpi_150">150 DPI · 远观</button>
              <button data-v="300" class="active" data-i18n="dpi_300">300 DPI · 精细</button>
            </div>
          </div>
        </div>

        <!-- 自定义 -->
        <div class="exp-panel" data-panel="custom" hidden>
          <div class="field">
            <label class="mini-label" data-i18n="f_aspect">画面比例</label>
            <select id="cust-aspect" class="sel">
              <option value="orig" data-i18n="asp_orig">跟随原图</option>
              <option value="1" data-i18n="asp_square">1 : 1 方形</option>
              <option value="0.8" data-i18n="asp_45">4 : 5 竖版</option>
              <option value="0.75" data-i18n="asp_34">3 : 4 竖版</option>
              <option value="0.66667" data-i18n="asp_23">2 : 3 竖版</option>
              <option value="1.33333" data-i18n="asp_43">4 : 3 横版</option>
            </select>
          </div>
          <div class="field">
            <div class="row"><label data-i18n="f_longedge">输出长边</label><span class="val" id="v-out">2000px</span></div>
            <input type="range" id="outsize" min="800" max="4800" step="100" value="2000">
          </div>
        </div>

        <div class="readout" id="readout">
          <div class="big">先上传一张照片</div>
          <div class="sub">导出规格会在这里显示</div>
        </div>
        <button class="btn btn-primary" id="export" style="margin-top:12px" data-i18n="btn_export">⤓ 导出 PNG</button>
      </div>
    </div>
  </aside>
</div>

<script>
"use strict";
/* =========================================================
   复古肌理插画生成器
   流水线: 缩放 → 对比度 → K-means聚类 → 区域平滑(众数滤波)
           → 上采样label → 描边膨胀 → 喷溅噪声 → 颗粒/纸张纹理
   设计要点: "分区"(慢,聚类)与"上色/肌理"(快,重绘)分离
   ========================================================= */

const $ = id => document.getElementById(id);
const cv = $('cv'), ctx = cv.getContext('2d');

// ---- 状态 ----
// 预览始终用这个长边渲染，保证流畅；导出时才按目标尺寸重渲染
const PREVIEW_LONG = 1400;

const state = {
  srcImg: null,        // 原始 Image
  artLabels:null, artW:0, artH:0,   // 分区结果(art层,缓存,排版时不重算)
  segW:0, segH:0,      // 聚类分辨率
  outW:0, outH:0,      // 输出分辨率

// =========================================================
// 2. 分区：缩放 + 对比度 + K-means + 平滑
// =========================================================
function segment(resetPalette){
  if(!state.srcImg) return;
  showLoader(t('load_seg'));
  // 让重计算在下一帧，保证 loader 显示
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    const img = state.srcImg;
    const k = +$('colors').value;
    const contrast = +$('contrast').value;
    const smooth = +$('smooth').value;

    // 聚类分辨率（控制速度），长边 ~ 420
    const segMax = 420;
    let sw = img.width, sh = img.height;
    const sScale = Math.min(1, segMax/Math.max(sw,sh));
    sw = Math.max(1,Math.round(sw*sScale));
    sh = Math.max(1,Math.round(sh*sScale));

    const tmp = document.createElement('canvas');
    tmp.width=sw; tmp.height=sh;
    const tg = tmp.getContext('2d');
    tg.drawImage(img,0,0,sw,sh);
    const data = tg.getImageData(0,0,sw,sh).data;

    // 对比度调整
    const px = sw*sh;
    const rgb = new Float32Array(px*3);
    for(let i=0;i<px;i++){
      for(let c=0;c<3;c++){
        let v = data[i*4+c];
        v = (v/255 - 0.5)*contrast + 0.5;   // 围绕中灰拉伸
        rgb[i*3+c] = clamp(v*255,0,255);
      }
    }

    // K-means
    const {labels, centroids} = kmeans(rgb, px, k, 14, state.segSeed);

    // 区域平滑（众数滤波，多次迭代）
    let lab = labels;
    for(let s=0;s<smooth;s++) lab = modeFilter(lab, sw, sh);

    // 缓存分区结果（art 层）：之后排版/上色不再重算聚类
    state.artLabels = lab; state.artW = sw; state.artH = sh;
    state.centroids = centroids;
    const k2 = centroids.length;
    if(resetPalette || state.palette.length !== k2){
      state.palette = centroids.map(c=>[c[0]|0,c[1]|0,c[2]|0]);
      applyPresetColors(PRESETS[0]);
    }
    buildSwatches();
    recompose();        // 排版（缩放/留白）+ 渲染
    updateReadout();
    updateDropLabel();  // 有图后上传条变「换一张」
    hideLoader();
  }));
}

function kmeans(rgb, n, k, iters, seed){
  const rnd = mulberry32((seed>>>0) || 1);
  const cent = new Float32Array(k*3);
  // k-means++ 初始化（带种子）：换种子 → 不同初始点 → 收敛到不同分区方案
  let f=(rnd()*n)|0;
  cent[0]=rgb[f*3]; cent[1]=rgb[f*3+1]; cent[2]=rgb[f*3+2];
  const d2=new Float32Array(n);
  for(let c=1;c<k;c++){
    let sum=0;
    for(let i=0;i<n;i++){
      const r=rgb[i*3],g=rgb[i*3+1],b=rgb[i*3+2];
      let best=1e18;
      for(let j=0;j<c;j++){
        const dr=r-cent[j*3],dg=g-cent[j*3+1],db=b-cent[j*3+2];
        const dd=dr*dr+dg*dg+db*db; if(dd<best)best=dd;
      }
      d2[i]=best; sum+=best;
    }
    // 按到最近中心的距离平方为概率，挑下一个中心
    let target=rnd()*sum, idx=n-1;
    for(let i=0;i<n;i++){ target-=d2[i]; if(target<=0){idx=i;break;} }
    cent[c*3]=rgb[idx*3]; cent[c*3+1]=rgb[idx*3+1]; cent[c*3+2]=rgb[idx*3+2];
  }
  const labels = new Uint8Array(n);
  const sum = new Float32Array(k*3), cnt = new Uint32Array(k);
  for(let it=0;it<iters;it++){
    sum.fill(0); cnt.fill(0);
    for(let i=0;i<n;i++){
      const r=rgb[i*3],g=rgb[i*3+1],b=rgb[i*3+2];
      let best=0,bd=1e18;
      for(let j=0;j<k;j++){
        const dr=r-cent[j*3],dg=g-cent[j*3+1],db=b-cent[j*3+2];
        const d=dr*dr+dg*dg+db*db;
        if(d<bd){bd=d;best=j;}
      }
      labels[i]=best;
      sum[best*3]+=r;sum[best*3+1]+=g;sum[best*3+2]+=b;cnt[best]++;
    }
    for(let j=0;j<k;j++){
      if(cnt[j]){cent[j*3]=sum[j*3]/cnt[j];cent[j*3+1]=sum[j*3+1]/cnt[j];cent[j*3+2]=sum[j*3+2]/cnt[j];}
    }
  }
  const centroids=[];
  for(let j=0;j<k;j++) centroids.push([cent[j*3],cent[j*3+1],cent[j*3+2]]);
  return {labels, centroids};
}

// 众数滤波（3x3）——清理杂点、平滑边界
function modeFilter(lab, w, h){
  const out = new Uint8Array(lab.length);
  const counts = new Uint16Array(16);
  for(let y=0;y<h;y++){
    for(let x=0;x<w;x++){
      let touched=[];
      for(let dy=-1;dy<=1;dy++){
        const yy=y+dy; if(yy<0||yy>=h)continue;
        for(let dx=-1;dx<=1;dx++){
          const xx=x+dx; if(xx<0||xx>=w)continue;
          const l=lab[yy*w+xx]; counts[l]++; touched.push(l);
        }
      }
      let best=lab[y*w+x],bc=0;
      for(const l of touched){ if(counts[l]>bc){bc=counts[l];best=l;} }
      for(const l of touched) counts[l]=0;
      out[y*w+x]=best;
    }
  }
  return out;
}

// =========================================================
// 3. 排版：把分区结果放进一张"纸"里，按比例与留白生成整页
//    longEdge 决定分辨率；sf=longEdge/PREVIEW_LONG 用于让描边/肌理
//    在任意分辨率下保持相同的视觉比例（所见即所得）
// =========================================================
function buildSheet(longEdge){
  const aw=state.artW, ah=state.artH;
  const e=state.exp;
  const artAR=aw/ah;
  const sheetAR = (e.aspect==='orig'||e.aspect==null) ? artAR : e.aspect;

  let sw,sh;
  if(sheetAR>=1){ sw=longEdge; sh=Math.round(longEdge/sheetAR); }
  else{ sh=longEdge; sw=Math.round(longEdge*sheetAR); }

  const sf=longEdge/PREVIEW_LONG;
  const marginPct=+$('margin').value/100;
  const mg=Math.round(longEdge*marginPct);
  const cw=Math.max(1,sw-2*mg), ch=Math.max(1,sh-2*mg);

  let dw,dh;
  if(artAR > cw/ch){ dw=cw; dh=Math.max(1,Math.round(cw/artAR)); }
  else{ dh=ch; dw=Math.max(1,Math.round(ch*artAR)); }
  const ox=Math.round((sw-dw)/2), oy=Math.round((sh-dh)/2);

  const big=new Uint8Array(sw*sh).fill(255);   // 255 = 纸张/留白
  for(let y=0;y<dh;y++){
    const ay=Math.min(ah-1,(y*ah/dh)|0);
    for(let x=0;x<dw;x++){
      const ax=Math.min(aw-1,(x*aw/dw)|0);
      big[(oy+y)*sw+(ox+x)]=state.artLabels[ay*aw+ax];
    }
  }
  const noise=makeNoise(sw,sh, Math.max(1.2, 2*sf));
  return {labels:big, w:sw, h:sh, noise, sf};
}

// 重排版（比例/留白变化时调用，预览分辨率，可缓存复用）
function recompose(){
  if(!state.artLabels) return;
  state.sheet=buildSheet(PREVIEW_LONG);
  repaint();
}
// 重绘（仅颜色/描边/肌理变化时调用，复用已缓存的 sheet，最快）
function repaint(){
  if(!state.sheet) return;
  paint(state.sheet, cv);
  $('wrap').style.display='block';
  $('hint').style.display='none';
  updateBadge();
}

// 噪声：小尺度 value-noise，做喷溅/颗粒
// 固定种子 PRNG，保证同尺寸下纹理稳定（拖滑块不抖动）；cell 随分辨率缩放，颗粒视觉大小一致
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function makeNoise(w,h,cell){
  const rnd=mulberry32(0x9e3779b1);
  const scale=cell;
  const gw=Math.ceil(w/scale)+2, gh=Math.ceil(h/scale)+2;
  const grid=new Float32Array(gw*gh);
  for(let i=0;i<grid.length;i++) grid[i]=rnd();
  const noise=new Float32Array(w*h);
  for(let y=0;y<h;y++){
    const gy=y/scale, y0=gy|0, fy=gy-y0;
    for(let x=0;x<w;x++){
      const gx=x/scale, x0=gx|0, fx=gx-x0;
      const a=grid[y0*gw+x0], b=grid[y0*gw+x0+1];
      const c=grid[(y0+1)*gw+x0], d=grid[(y0+1)*gw+x0+1];
      const top=a+(b-a)*fx, bot=c+(d-c)*fx;
      noise[y*w+x]=top+(bot-top)*fy;
    }
  }
  return noise;
}

// =========================================================
// 4. 渲染：填色 + 描边 + 喷溅 + 颗粒 + 纸张（实时）
// =========================================================
function paint(sheet, canvas){
  const {labels:lab, w, h, noise, sf} = sheet;
  const pal=state.palette, ink=state.ink, bg=state.bg;
  const c=canvas.getContext('2d');

  // 描边/喷溅按分辨率缩放，保证不同尺寸下视觉比例一致
  const thick=Math.round((+$('thick').value)*sf);
  const rough=+$('rough').value/100;
  const grain=+$('grain').value/100;
  const paperT=+$('paper').value/100;

  canvas.width=w; canvas.height=h;
  const out=c.createImageData(w,h);
  const o=out.data;

  // 4a. 填底色（255=纸张）
  for(let i=0;i<w*h;i++){
    const cc=pal[lab[i]]||bg;
    o[i*4]=cc[0];o[i*4+1]=cc[1];o[i*4+2]=cc[2];o[i*4+3]=255;
  }

  // 4b. 边缘检测（label 交界）。255=留白：不参与、也不与之产生交界
  const edge=new Uint8Array(w*h);
  for(let y=0;y<h;y++)for(let x=0;x<w;x++){
    const i=y*w+x,l=lab[i];
    if(l===255) continue;
    let e=0;
    if(x+1<w){const n=lab[i+1]; if(n!==l&&n!==255)e=1;}
    if(!e&&y+1<h){const n=lab[i+w]; if(n!==l&&n!==255)e=1;}
    if(!e&&x>0){const n=lab[i-1]; if(n!==l&&n!==255)e=1;}
    if(!e&&y>0){const n=lab[i-w]; if(n!==l&&n!==255)e=1;}
    edge[i]=e;
  }

  // 4c. 距离场：BFS 膨胀，记录到边缘的步数
  const dist=new Int16Array(w*h).fill(-1);
  let frontier=[];
  for(let i=0;i<w*h;i++) if(edge[i]){dist[i]=0;frontier.push(i);}
  const band = thick + Math.round(thick*0.9) + Math.max(2, Math.round(4*sf));
  for(let d=0; d<band && frontier.length; d++){
    const next=[];
    for(const i of frontier){
      const x=i%w,y=(i/w)|0;
      if(x+1<w&&dist[i+1]<0){dist[i+1]=d+1;next.push(i+1);}
      if(x>0&&dist[i-1]<0){dist[i-1]=d+1;next.push(i-1);}
      if(y+1<h&&dist[i+w]<0){dist[i+w]=d+1;next.push(i+w);}
      if(y>0&&dist[i-w]<0){dist[i-w]=d+1;next.push(i-w);}
    }
    frontier=next;
  }

  // 4d. 上墨：实心核 + 噪声调制的喷溅边缘
  for(let i=0;i<w*h;i++){
    const dd=dist[i];
    if(dd<0||dd>band) continue;
    let inkProb;
    if(dd<=thick){
      inkProb = 1 - rough*0.25*(noise[i]);
    }else{
      const t=(dd-thick)/(band-thick+0.001);
      inkProb = (1-t)*(1-t) * (0.4+rough);
    }
    if(noise[i] < inkProb){
      o[i*4]=ink[0];o[i*4+1]=ink[1];o[i*4+2]=ink[2];o[i*4+3]=255;
    }
  }

  // 4e. 颗粒肌理 + 纸张（颗粒按 sf 采样，视觉粒度一致）
  if(grain>0||paperT>0){
    for(let i=0;i<w*h;i++){
      if(grain>0){
        const x=i%w,y=(i/w)|0;
        const gi=((y/sf)|0)*4099+((x/sf)|0);
        const n2 = fract(Math.sin(gi*12.9898+78.233)*43758.5453);
        const g=(n2-0.5)*grain*70;
        o[i*4]=clamp(o[i*4]+g,0,255);
        o[i*4+1]=clamp(o[i*4+1]+g,0,255);
        o[i*4+2]=clamp(o[i*4+2]+g,0,255);
      }
      if(paperT>0){
        const p=(noise[i]-0.5)*paperT*40;
        o[i*4]=clamp(o[i*4]-p*0.5,0,255);
        o[i*4+1]=clamp(o[i*4+1]-p*0.5,0,255);
        o[i*4+2]=clamp(o[i*4+2]-p*0.4,0,255);
      }
    }
  }

  c.putImageData(out,0,0);
}

// 5. 配色 UI
// =========================================================
function buildSwatches(){
  const box=$('swatches'); box.innerHTML='';
  state.palette.forEach((c,i)=>{
    const sw=document.createElement('label'); sw.className='sw';
    sw.style.background=rgb2hex(c);
    sw.innerHTML=`<span class="n">${i+1}</span>
      <input type="color" value="${rgb2hex(c)}">`;
    sw.querySelector('input').addEventListener('input',e=>{
      state.palette[i]=hex2rgb(e.target.value);
      sw.style.background=e.target.value;
      repaint();
    });
    box.appendChild(sw);
  });
}

function applyPresetColors(hexArr){
  // 按聚类中心明度排序，依次套用预设颜色（暗→亮 对应 预设顺序）
  const k=state.centroids.length;
  const order=state.centroids.map((c,i)=>({i,l:0.3*c[0]+0.59*c[1]+0.11*c[2]}))
                            .sort((a,b)=>a.l-b.l);
  const cols=hexArr.map(hex2rgb);
  order.forEach((o,rank)=>{
    state.palette[o.i]=cols[rank % cols.length].slice();
  });
}

function buildPresets(){
  const box=$('presets'); box.innerHTML='';
  PRESETS.forEach(p=>{
    const el=document.createElement('div'); el.className='preset';
    p.forEach(h=>{const i=document.createElement('i');i.style.background=h;el.appendChild(i);});
    el.addEventListener('click',()=>{ if(!state.artLabels)return; applyPresetColors(p); buildSwatches(); repaint();});
    box.appendChild(el);
  });
}

// 7. 导出：用途 → 比例/像素，并把 DPI 写入 PNG
// =========================================================
const SOCIAL=[
  {zh:'小红书 · 竖版',   en:'Xiaohongshu · Portrait', tag:'3:4',  ratio:3/4,  long:1440},
  {zh:'方形 · 通用',     en:'Square · Universal',     tag:'1:1',  ratio:1,    long:1080},
  {zh:'Instagram 竖图',  en:'Instagram · Portrait',   tag:'4:5',  ratio:4/5,  long:1350},
  {zh:'朋友圈 / Story',  en:'Story / Reels',          tag:'9:16', ratio:9/16, long:1920},
  {zh:'壁纸 · 横屏',     en:'Wallpaper · Landscape',  tag:'16:9', ratio:16/9, long:2560},
];
const PAPERS=[
  {zh:'A4（21 × 29.7 cm）', en:'A4 (21 × 29.7 cm)', w:21,   h:29.7},
  {zh:'A3（29.7 × 42 cm）', en:'A3 (29.7 × 42 cm)', w:29.7, h:42},
  {zh:'A2（42 × 59.4 cm）', en:'A2 (42 × 59.4 cm)', w:42,   h:59.4},
  {zh:'30 × 40 cm 画框',    en:'30 × 40 cm Frame',  w:30,   h:40},
  {zh:'40 × 50 cm 画框',    en:'40 × 50 cm Frame',  w:40,   h:50},
  {zh:'50 × 70 cm 画框',    en:'50 × 70 cm Frame',  w:50,   h:70},
  {zh:'60 × 80 cm 画框',    en:'60 × 80 cm Frame',  w:60,   h:80},
];
let socialSel=0, printDpi=300, printOrient='portrait', expMode='social';

// 社交预设卡片（按当前语言重建，保留选中态）
function buildSocialGrid(){
  const box=$('social-grid'); box.innerHTML='';
  SOCIAL.forEach((p,i)=>{
    const el=document.createElement('button'); el.className='preset-btn'+(i===socialSel?' active':'');
    const L=22, w=p.ratio>=1?L:Math.round(L*p.ratio), h=p.ratio>=1?Math.round(L/p.ratio):L;
    el.innerHTML=`<span class="preset-left">
        <span class="pratio" style="width:${w}px;height:${h}px"></span>
        <span class="pname">${p[lang]}</span></span>
      <span class="pdim">${p.tag}</span>`;
    el.addEventListener('click',()=>{ socialSel=i;
      [...box.children].forEach((c,j)=>c.classList.toggle('active',j===i)); applyExport(); });
    box.appendChild(el);
  });
}
// 画框尺寸下拉（按当前语言重建，保留选中项）
function buildPaperOptions(){
  const sel=$('papersize'); const cur=sel.value; sel.innerHTML='';
  PAPERS.forEach((p,i)=>{ const o=document.createElement('option'); o.value=i; o.textContent=p[lang]; sel.appendChild(o); });
  if(cur) sel.value=cur;
}
// 分段按钮
function segBind(id, cb){
  $(id).addEventListener('click',e=>{ const b=e.target.closest('button'); if(!b)return;
    [...$(id).children].forEach(c=>c.classList.toggle('active',c===b)); cb(b.dataset.v); });
}
segBind('dpi', v=>{ printDpi=+v; applyExport(); });
segBind('orient', v=>{ printOrient=v; applyExport(); });

// Tab 切换
$('exp-tabs').addEventListener('click',ev=>{
  const b=ev.target.closest('.tab'); if(!b)return; expMode=b.dataset.mode;
  [...$('exp-tabs').children].forEach(el=>el.classList.toggle('active',el===b));

});

// 把当前模式选择写进 state.exp；比例变了才重排版，否则只更新读数
function applyExport(){
  const e=state.exp, prevAspect=e.aspect;
  if(expMode==='social'){
    const p=SOCIAL[socialSel];
    e.mode='social'; e.aspect=p.ratio; e.long=p.long; e.dpi=0; e.name=p[lang]; e.tag=p.tag;
  }else if(expMode==='print'){
    const p=PAPERS[+$('papersize').value];
    let pw=p.w, ph=p.h; if(printOrient==='landscape'){ const tmp=pw; pw=ph; ph=tmp; }
    e.mode='print'; e.aspect=pw/ph; e.dpi=printDpi;
    e.long=Math.round(Math.max(pw,ph)/2.54*printDpi);
    e.name=p[lang].split(/[（(]/)[0].trim(); e.tag=`${pw}x${ph}cm`;
  }else{
    const a=$('cust-aspect').value;
    e.mode='custom'; e.aspect = a==='orig'?'orig':parseFloat(a);
    e.long=+$('outsize').value; e.dpi=0; e.name=t('tab_custom'); e.tag='custom';
  }
  if(state.artLabels && e.aspect!==prevAspect) recompose();
  updateReadout();
}

// 导出像素尺寸（按当前比例 + 目标长边）。超大尺寸自动限幅：
// 降低有效 DPI 但保持物理尺寸不变，避免浏览器卡死
function exportDims(){
  const e=state.exp, aw=state.artW||3, ah=state.artH||4;
  const ar = e.aspect==='orig' ? aw/ah : e.aspect;
  const CAP=5000;
  let long=e.long, dpi=e.dpi, capped=false;
  if(long>CAP){ const s=CAP/long; dpi = dpi>0?Math.round(dpi*s):0; long=CAP; capped=true; }
  let w,h;
  if(ar>=1){ w=long; h=Math.round(long/ar); } else { h=long; w=Math.round(long*ar); }
  return {w,h,dpi,capped};
}
function updateBadge(){
  const {w,h,dpi}=exportDims();
  $('badge').textContent = dpi>0 ? `${w} × ${h} · ${dpi}DPI` : `${w} × ${h}`;
}
function updateReadout(){
  const e=state.exp, {w,h,dpi,capped}=exportDims();
  const big=document.querySelector('#readout .big'), sub=document.querySelector('#readout .sub');
  if(!state.artLabels){ big.textContent=t('ro_empty_b'); sub.textContent=t('ro_empty_s'); return; }
  if(e.mode==='print'){
    big.innerHTML=`<b>${w} × ${h}</b> px · ${dpi} DPI`;
    sub.textContent=t('ro_print_sub',{w:(w/dpi*2.54).toFixed(0),h:(h/dpi*2.54).toFixed(0),name:e.name})
      + (capped?t('ro_capped'):'');
  }else if(e.mode==='social'){
    big.innerHTML=`<b>${w} × ${h}</b> px · ${e.tag}`;
    sub.textContent=t('ro_social_sub',{name:e.name});
  }else{
    big.innerHTML=`<b>${w} × ${h}</b> px`;
    const at=d=>`${(w/d*2.54).toFixed(0)}×${(h/d*2.54).toFixed(0)}cm`;
    sub.textContent=t('ro_custom_sub',{a300:at(300),a150:at(150)});
  }
}

// 导出：高分辨率重渲染 + 写入 DPI
async function doExport(){
  if(!state.artLabels) return;
  showLoader(t('load_export'));
  await new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)));
  try{
    const {w,h,dpi}=exportDims();
    const sheet=buildSheet(Math.max(w,h));
    const off=document.createElement('canvas');
    paint(sheet, off);
    const blob=await new Promise(res=>off.toBlob(res,'image/png'));
    let bytes=new Uint8Array(await blob.arrayBuffer());
    if(dpi>0) bytes=injectDPI(bytes, dpi);
    const url=URL.createObjectURL(new Blob([bytes],{type:'image/png'}));
    const a=document.createElement('a'); a.href=url; a.download=exportName(); a.click();
    setTimeout(()=>URL.revokeObjectURL(url),1500);
  }catch(err){ console.error(err); alert(t('alert_export')); }
  hideLoader();
}
function exportName(){
  const e=state.exp;
  const t=e.tag.replace(/[^\w.x:-]/g,'').replace(':','-');
  return `retro_${e.mode}_${t}${e.dpi>0?'_'+e.dpi+'dpi':''}.png`;
}
// 把物理分辨率写进 PNG 的 pHYs 块（否则打印软件按 72DPI 计算，物理尺寸会错）
const CRC_TABLE=(()=>{const t=new Uint32Array(256);for(let n=0;n<256;n++){let c=n;for(let k=0;k<8;k++)c=(c&1)?(0xEDB88320^(c>>>1)):(c>>>1);t[n]=c>>>0;}return t;})();
function crc32(buf,s,e){let c=0xFFFFFFFF;for(let i=s;i<e;i++)c=CRC_TABLE[(c^buf[i])&0xFF]^(c>>>8);return (c^0xFFFFFFFF)>>>0;}
function injectDPI(png, dpi){
  const ppm=Math.round(dpi/0.0254);            // 像素/米
  const chunk=new Uint8Array(21);
  const dv=new DataView(chunk.buffer);
  dv.setUint32(0,9);
  chunk[4]=0x70;chunk[5]=0x48;chunk[6]=0x59;chunk[7]=0x73; // 'pHYs'
  dv.setUint32(8,ppm); dv.setUint32(12,ppm); chunk[16]=1;  // 单位=米
  dv.setUint32(17, crc32(chunk,4,17));
  const at=8+25;                                // 签名(8)+IHDR(25) 后插入
  const out=new Uint8Array(png.length+chunk.length);
  out.set(png.subarray(0,at),0); out.set(chunk,at); out.set(png.subarray(at),at+chunk.length);
  return out;
}
$('export').addEventListener('click', doExport);

// 量出预览区可用高度，写进 CSS 变量，确保大图在分栏里完整显示不被裁切
function fitPreview(){
  const pv=document.querySelector('.preview'); if(!pv) return;
  const cs=getComputedStyle(pv);
  const h=pv.clientHeight - parseFloat(cs.paddingTop) - parseFloat(cs.paddingBottom);
  if(h>0) document.documentElement.style.setProperty('--canvas-maxh', Math.floor(h)+'px');
}
